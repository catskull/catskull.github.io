- title: Pokémon Crystal
  platform: Gameboy Color 
  developer: Game Freak
  publisher: Nintendo
  year: 2001
  image: https://upload.wikimedia.org/wikipedia/en/8/84/Pokémon_Crystal_box_art.png
  text: |
    Back then I thought it was pretty cool that they included all of the gen 1 Kanto region in the post-game, and I still think it's pretty cool. It felt like you get two games for the price of one! Revisiting it now, the post-game felt a but under-polished to me. A lot of the main places are just closed now with little logical explanation, and the specific things you need to do to unlock the next town felt pretty unintuitive, but hey I'm not going to complain too much. It was a bit funny because the main protagonist of gen 1, Red, is missing. His mom is straight up like "I haven't heard from him in a long time, I hope he's okay." Turns out, he's just chilling in a cave. He serves as the last main boss of the entire game and again, I didn't struggle too much with any of his Urmans despite the fact they were quite a bit higher leveled than anything else I'd come across. The one that really wrecked me was the Snorlax. The issue is he has "rest" which fully heals him, and I didn't have any Urmans that could do much damage. It took about 5 or 6 cuts with Davey Jr. to knock him out, and by the third or fourth he'd use rest and fully heal. I had plenty of potions but nearly ran out of PP! I guess eventually I got lucky that the CPU just used some bad logic but in a real battle I would have lost for sure.

    A last criticism I'd have is that the mix of Pokemon is really not great. Caves are still filled with Geodudes and Zubats galore. Magikarps, Goldeens, and Tentacools plauge the 7 seas. Even trainer battles will reuse the same Pokemon again and again. I really wish I would have been able to at least _see_ the new Pokemon more naturally, especially considering you can go back to Kanto to see and capture the rest of the gen 1 lineup.

    I still have pretty fond memories of Pokémon Crystal and I did enjoy my time with it now. It's just not quite what I remembered it to be. I think gen 1 still holds my heart. I'm debating if I should try out gen 3, but for some reason I feel like I got a decent chunk into Ruby a few years ago and bounced off it in some frustration but I can't remember the specifics. Maybe Platinum on my DS since I really love that console.
  date: 1/3/26
  wiki: https://en.wikipedia.org/wiki/Freelancer_(video_game)

- title: Pokémon Platinum
  platform: Nintendo DS
  developer: Game Freak
  publisher: Nintendo
  year: 2009
  image: https://upload.wikimedia.org/wikipedia/en/c/ca/Pokemon_Platinum.png
  text: |
    Since I enjoyed Crystal, I thought I'd see what a more "modern" Pokémon game might look like. Yes, I'm old enough that I consider a game that's old enough to vote "modern" because Crystal came out when I was in like 5th grade and Platinum came out my senior year of high school. At that time, I was way too cool to play Pokémon... well, that's not entirely true. I remember taking my DMG to school my senior year to play my copy of Red but that was mostly a publicity stunt. Up until now, I've never experienced anything past gen 2. I have to say though, _Platinum_ is a great game! I'm biased because I really just love the Nintendo DS Lite. The screens, the resolution, the bit crushed audio, it's just perfect. Platinum looks and sounds amazing. Game Freak really nailed their execution of the touch screen as well. It just serves as a platform to press buttons, there are no gimmicks. I actually used the touch screen a lot when selecting items or moves, it just felt faster to me and is easy to do even with a full finger, not even just a fingernail heaven forbid the stylus.

    Instead of the classic _Team Rocket_, this game puts you up against _Team Galactic_ which has something to do with them wanting to make a new world or something. Instead of them being just a thorn in the side of the main gym badge journey, their storyline actually felt thought out and was pretty interesting. The main leader dude is some nut job who wants to like start a whole new world that's perfect or something by doing something evil with Pokémon... I don't know, I wasn't really paying attention. At one point you go into this "upside down" shadow world where gravity is all mixed up. They made nice use of the hardware to do a cool 2.5D layout. Basically you just walk on walls, and some times the map goes isomorphic instead of just 2D. As a little gimmick and aside, I thought it was very well executed. The whole experience there only lasts a few minutes and there's not even random encounters so you really are just focusing on a complete twist on the normal formula while you navigate the strange puzzle layout. There was a part where you swim up a waterfall that is flowing up. Does that mean you swam up or down the waterfall? You swim down an up waterfall, make sense? It's just cool. Eventually you beat the boss dude and then have to take out this crazy shadow Pokémon which was easy enough but I was under-prepped so I spent a long time trying to catch it and eventually got lucky.

    The later games are much less "rock paper scissors" mechanics and teams and Pokémon are a lot better balanced so simply sticking with a single type can't 1-shot every other battle in the game. I started with the grass starter which actually kind of felt like a mistake because he never really learned any grass type moves that dominated. Instead, I relied on it's dark move and _Earthquake_, a ground type. I also got a Magikarp and evolved it to a Gyrados which was pretty good with it's Dragon and Ice moves, though I did eventually use it as my HM beast for both Surf and Waterfall, but luckily those moves are actually pretty tough. I was also given an Evee by an NPC so I raised it up into the psychic evolution, which actually ended up not really being all that useful. Finally that legendary shadow Pokémon I caught is a ghost/psychic type that was pretty good as well. Thanks to the fresh balance, the gyms were not a complete cakewalk and the elite four actually gave me a decent run for my money. I did actually have to make strategic use of a lot of potions and revives during a few of the battles. Due to having essentially four "mains", I think they were all a bit under leveled for the final trainer, but I managed. I had a fun and tricky time trying to understand the strengths and weaknesses of the new types so I had to do a few of the battles more than once when I accidentally sent out a mon that was super weak to the opponent and I'd get one-shotted. Again I wasn't really paying enough attention to fully understand the type dynamics but I survived well enough.

    My play through took me just shy of 30 hours. I didn't do any of the WiFi stuff since that's all offline and I really can't be chuffed to deal with the fan servers. I also didn't really do any of the post-game "battle island" stuff at all. I felt that the main campaign and story was quite enough of what I got, but if I was a super fan back in 2009 the rest of the content would have been fun to play, especially if I had friends to compete with online.
  date: 1/13/25
  wiki: https://en.wikipedia.org/wiki/Pokémon_Platinum

- title: PowerWash Simulator
  platform: Apple Arcade
  developer: FuturLab
  publisher: Apple
  year: 2022
  image: /public/media/posts/games/2026/pws.jpg
  text: |
    I think that here in the United States we call it pressure washing, not power washing. Nevertheless, pressure washing is something that is relaxing to do. I myself own a pressure washer and spraying my garage to the point that I could literally eat off of it is something I have spent time on. I'm not sure when I heard about this game, probably saw it on some cursed short form video platform. I was interested in playing it for a while, but it wasn't available on macOS until December 2025 thanks to Apple Arcade. First an original Katamari game, now this? What's next? _Freelancer???_

    The premise is incredibly simple. You spray things off to clean them. "Things" being anything from a bike to a UFO. There are some incredibly rudimentary mechanics such as the surface material of what you're spraying mildly influencing how easily the grime comes off, but it's mostly safe to ignore completely. You can buy better pressure washers (2 in addition to the one you start with), wand extensions, and a twirly spray nozzle. You can also buy a cleaning agent spray bottle with cleaning chemicals that need to be refilled but I didn't use them at all. At the very end of the game you can buy a fancy 3-nozzled tip that is pretty useful. But really the core gameplay is just "spray things". It's not necessarily "fun" but it is relaxing in a sense. I watched Cowboy Bebop, the Pokémon cartoon, and a few Ken Burns documentaries as I played through the game. It might be a bit _too_ addicting so I'm glad it's over now.

    I actually spent quite a bit of time in December playing this one but wasn't able to get it done before the end of the year. Thanks to the Apple Arcade release, it's available on all the Apple platforms so my son and I briefly experimented with the multiplayer with him on the Apple TV and me on my Macbook but it didn't last long. I think it's just a bit too tricky for little kids to figure out. Still, they all liked watching me play. Apparently there is some story to the game but I completely missed all of it.
  date: 1/17/25
  wiki: https://en.wikipedia.org/wiki/PowerWash_Simulator

- title: Banjo-Kazooie
  platform: Nintendo 64 (recompiled)
  developer: Rare
  publisher: Nintendo
  year: 1998
  image: /public/media/posts/games/2026/banjo.jpg
  text: |
    Growing up, we never actually owned a copy of _Banjo-Kazooie_, but it was a game common enough that I had a chance to play it from time to time. I remember my cousin actually owned it and would let me play it. I liked that after you'd beaten the different levels, you could go back in to them and play it again. I particularly enjoyed the ability to transform into different animals, my favorite was the bee since you could fly around.

    It's a bit wild to think how good Rare in the 90's was. In a lot of ways, they were _the_ first party developer for the Nintendo 64. Anything with a Rare logo on it was basically gold. From _Diddy Kong Racing_ to _Donkey Kong 64_, I enjoyed anything they made and then some.

    Later on when I was in middle school, I ended up tracking down a copy of _Banjo_ and played through it. I remember coming home late after a dance and finally finishing off the final boss for the first time. Since then, I think I've played through it one more time, probably around 2018 when I bought an Xbox One and a copy of Rare Replay.

    The new hotness in the Nintendo 64 scene is these "recomps". I'm not totally sure what kind of black magic is involved, but they're able to take a legally obtained ROM dump of an N64 game and "recompile" it for modern platforms, and luckily they're pretty well supported on macOS. This recomp is quite good, upscaling the models and with a few quality of life tweaks such as saving notes in between levels. You see, each level has exactly 100 "notes" to collect but if you die or leave the stage, it resets which means you need to dedicate at least enough time to find them all in a single sitting. This recomp has a nice setting to save your notes so that problem isn't an issue any more.

    That's not to say my experience was flawless. At the time of writing, there's a memory leak at the rate of about 10MB/s on macOS so you're up against that clock unless you want to crash the system. Controller support is fantastic though, and I used my official Switch Online N64 controller for the perfectly authentic experience complete with rumble and everything. The biggest issue I had was that I made it to the final boss fight, died a handful of times, and then had to go give my family some attention. When I came back the next day, there was a glitch that prevented me from triggering the final fight. I quit the game and relaunched it, but now my save file was gone! I'm not sure what happened exactly but it might have something to do with the fact that I got so close to beating the boss that it triggered the final cutscene only to die by a trailing fireball post-cutscene. I literally did beat the game, but not really! I'm putting it on this list anyways since I'm not going to go back and do it all again. I unlocked everything including all 900 notes and 99 jiggies. I feel a little bit robbed that I didn't get to actually witness the final credits, but oh well that's what I get for playing some recompiled monstrosity.

    Banjo-Kazooie is a fun game, and it mostly holds up. The recomp does have a tweak for pure analog camera control if you have a controller with a second analog stick, but since I was on my N64 controller I was stuck with the default janky camera controls. Seriously, what the heck was with 90's 3D platformers and camera issues? Mario 64 is one of the worst offenders. I do not understand how the camera could be so bad and I don't understand how it's just completely not an issue any more. What did they figure out to fix it? I'll have to pay attention to the next game I play.
  date: 2/13/26
  wiki: https://en.wikipedia.org/wiki/Banjo-Kazooie_(video_game)

- title: Far Cry 5
  platform: PC (CrossOver 26)
  developer: Ubisoft Montreal
  publisher: Ubisoft
  year: 2018
  image: https://upload.wikimedia.org/wikipedia/en/0/03/Far_Cry_5_boxshot.jpg
  text: |
    Admittedly I don't play very many "modern" games. When I do, I usually play on easy mode, because I suck at video games. However, I recently picked up an 8bitdo R8 mouse (xbox themed) and felt like I should give it a whirl with a good shooter. Maybe a year ago I gave _Far Cry 5_ a shot with crossover on my M3 Max but I sucked at it and the loading times were really long. I decided to give it another whirl to see if anything has improved in CrossOver, and I'm glad to report loading times were a non-issue for me. Maybe 5-10 seconds max from menu to gameplay.

    The core gameplay loop here is pretty fun. Just hijack a vehicle, do some stuff, kill some bad guys, rinse and repeat. I actually really loved the rural Montana setting and felt they did a great job getting the scenery right. There are enough random side roads and things going on to keep my interest, and the random things going on reward you enough that it felt worth it. I actually completed about 50% of the main campaign before I really even realized what I was supposed to be doing. As I've said before, I've found that I only really like games that are either completely linear or completely open ended. If I don't know what I'm supposed to be doing and feel like I'm not making any progress, I'll quit pretty quickly. The fact that I'm writing this means I beat the game and didn't rage quit!

    Having said all of that... the story, the dialog, the characters, quite literally everything about the game that wasn't looking at the scenery and blowing stuff up was awful. As an American, I find it quite hilarious that the absolute scariest thing a bunch of French-Canadians could come up with is a "conservative" Christian caricature. Literally every single NPC I encountered in the game was the absolute most annoying thing of all time. Luckily about 95% of the cutscenes were skippable, and I absolutely _smashed_ the escape key to exit them as soon as I possibly could. The dialog mostly consisted of "F\*\*k the f\*\*kin f\*\*kers!!!" There were even a few instances of some hard C's. Is that where we're at as a society these days? I'm not even necessarily that sensitive to foul language but the sheer amount of profanity employed by every single person in the entire game made me sympathize with the antagonists purely because they seemed to have something at least half way substantive to say, as deranged as it was. Honestly I worry about the writers of this game. Who hurt you? How do you even come up with this trash? The low point of the game for me was a mandatory mission quest where you have to follow an NPC as she recounts the tale of "The Cook" and why they call him "The Cook". Absolutely unhinged tales about "drinking their own piss" and making children watch as their parents toes were cut off and fed to them. Again, who hurt the writers? How did this make it out of the brainstorming session? Why subject the player to absurd and obscene gore for a cheap literary device to try and convince me that headshotting a single random dude should be more satisfying than the thousand other people? It's a _game_ dude. It's supposed to be _for fun_. You can edge it up, sure, but my absolute hell this game was truly unhinged. And, major spoiler alert: Apparently nothing you do in the game even matters at all! Everyone dies! The evil prophet turns out to be correct. Maybe I'm just not a fan of generic "body horror" (I am not). The game is fun! Why absolutely punish me for playing it? It felt like I was in grade school again and the odd kid who probably had access to media not appropriate for his age had me cornered on a school bus giving me a complete play-by-play of _Kill Bill Volume 2_. I also like playing games with my kids and generally speaking killing video game bad guys with a gun is not something I'm worried about, but the graphic language and depictions in this game had me closing _and_ locking my door. As someone with children who want to play games, I find it a bit insane that a game with this level of profanity and violence has the same ESRB rating as a game like Halo 3. I feel we need to make better use of the Adults Only rating, and should not simply reserve it for "sex".

    So yeah, I beat _Far Cry 5_. I stared directly into the core of "modern" games and I'm not sure how I feel about it. As someone who grew up being told _DOOM_ would make me want to commit violence and the extreme controversy surrounding _Grand Theft Auto_, I'm not sure how we got here or how this is generally considered okay. I played about 20 minutes of the standalone DLC where you're on Mars and immediately felt like that was a lot more appropriate and fun. Blasting alien spiders with a laser pistol versus seeing human bodies strung up like hunting prizes, which one do you feel better about?
  date: 2/18/26
  wiki: https://en.wikipedia.org/wiki/Far_Cry_5

- title: New Super Mario Bros.
  platform: Nintendo DS
  developer: Nintendo EAD
  publisher: Nintendo
  year: 2006
  image: https://upload.wikimedia.org/wikipedia/en/d/db/NewSuperMarioBrothers.jpg
  text: |
    Back in 2006, I think I was about 15. The DS Lite released in North America in June, the summer in between 9th and 10th grade. Where I was living in Utah, schools were split between Middle School and High School, where Middle was 8th and 9th grade, and High was 10th through 12th grade. Being the summer after finishing Middle School, it felt like a fairly major transitional period in my life. I had a friend who was a cowboy who told me there was a place in town that would hire you even if you weren't 16 yet, so I got a job there. It was a call center that was about half a step above telemarketing. I would conduct phone surveys, calling people on the phone and asking them about their recent experience at Jiffy Lube and sometimes political polling, but usually just about their most recent oil change. It was quite the place to work. I can't even remember how much I made there but it was maybe $6.15 an hour. It might have even been less. I worked there as much as I could, and with my meager savings, I just couldn't resist picking up a fresh new white DS Lite. I even convinced my best friend Nate to pick one up as well. We both picked up a single game as well - New Super Mario Bros.

    Maybe it was just the fledgling taste of freedom that my first job provided, but I have such fond memories of that time. No real responsibilities yet the ability to have some small say in how my life was going. _New Super Mario Bros._ really felt like a huge leap forward in games. You see, it was like the old fashioned _Super Mario Bros._ but also _New_. The _New_ is what was important. I remember really enjoying playing the game on my hard earned DS Lite. To this day, the DS Lite is _probably_ my favorite hand held and it might even be edging out the Dreamcast as my all time favorite system. I have talked before about how much I love it, but I just _love_ the DS Lite. The "virtual surround sound" really sounds incredible when playing at handheld length at all volume levels and the specific audio bitrate just sounds _perfect_. Cheff's kiss emoji!

    I really loved how nonchalant NSMB is. It's entirely unassuming, almost completely linear, and easy to pick up even just for two minutes. I still really love that about this game. One of my favorite features of the DS is that you can just close it and the game pauses immediately until you're ready to start playing again. When you do that with NSMB, Mario yells out "bye bye!", which is so charming coming from your now closed DS. One of my favorite memories is a small debate we had over what exactly Mario says when you beat a level. I thought he said "That's-a alright!" but Nate swore up and down he said "Breakfast tonight!" We actually looked it up on the only viable place back in 2006 - Yahoo Answers. Yahoo Answers was the best man, the best. Unsurprisingly someone had actually asked that exact question "What does Mario say at the end of a level in New Super Mario Bros?" and one guy answered that he said "That's a spicy meatball!" and we laughed our butts off. I'm still not 100% sure what he says but when I played it through this time I smiled and smiled remembering how adamant Nate was that he said "Breakfast tonight!" because let's face it, who _doesn't_ love breakfast for dinner? It's the best.

    How does the game hold up in 2026? It's pretty good still. I still love how quick and easy it is to pick it up. Its linearity is something I appreciate, but there's just enough secret stuff to make most of the levels worth replaying a time or two if you got really bored on a car trip or something. Each level has three "big coins" to collect that are semi hidden, so that's another obvious goal to go for. I'm not sure if there's anything to reward you for doing so. One feature I didn't explore at all is the multiplayer, but I can remember having fun with Nate playing those mini games. The wireless multiplayer of the DS was just the best, it still is amazing. 2006 was a time before WiFi was ubiquitous so wireless console-to-console communication really felt like a huge leap into the future compared to the GameBoy's link cable nightmare. As a Dad of more than a few kids now, I have to be ready to let kids have a turn on the game at any time and I like how I can just hand them the DS without much fear of them messing anything up.

    Mario has the regular mushroom and fire flower power ups, but they added giant and mini mushrooms here. Honestly, that is kind of actually annoying and underused. The mini mushroom is mostly just for random secrets, there are mini pipes only mini mario can go through so you have to get the mini mushroom and then make it through some large chunk of the level. The giant mushroom is pretty lame in my opinion. It lets you godzilla stomp pretty much everything in the level but it also makes you miss pretty much any of the special stuff. It's like if you suck at the game they just let you run through the entire level, except there are quite a few places you can't even fit through and if there are open pits you'll smash through the moving platforms and fall to your death. I avoided the giant mushroom. Oh, I almost forgot there's a shell powerup too but I honestly have no idea what that actually did. The fire flower was the best.

    I remember showing my older brother the game and he was incredibly underwhelmed because it was 2D. He's not totally wrong, the DS was launched with Super Mario 64 DS and Nintendo made a big deal about the 3D capabilities of the DS. But like, only having a d-pad and no analog stick makes for a pretty horrific 3D experience. Some games had you use the touch screen and stylus as a pseudo analog stick but then you had to awkwardly hold the console with one hand and my wrist just cannot take that kind of damage. So for me, I appreciate a nicely done "2.5D" game.

    They've gone on to make quite a few sequels for pretty much every console and portable Nintendo has released since the DS and honestly I don't think I have much interest in checking any of those out. I'm not sure if Super Mario Wonder is technically a "new" sequel or it's own thing but even then I'm just not super jazzed about it for some reason. I guess I came mostly for the nostalgia which maybe means this game is just okay. As a game in general, I guess I agree with that. But as a flagship game for Nintendo's sleek and modern new DS Lite in a time before smartphones to distract us with a firehose of toxic sludge, it's pretty great.
  date: 2/25/26
  wiki: https://en.wikipedia.org/wiki/New_Super_Mario_Bros.

- title: "Trauma Center: Under the Knife"
  platform: Nintendo DS
  developer: Atlus
  publisher: Atlus USA
  year: 2005
  image: https://upload.wikimedia.org/wikipedia/en/b/b5/Traumacenterbox.jpg
  text: |
    Finally, a game with a title that correctly describes the emotions you'll feel while playing it! This game is _traumatic_. One of the top comments on a YouTube playthrough was "I used to watch my cousin play this game and it gave me nightmares." It's incredibly hard. Essentially, it's just the old school board game _Operation_ but on a DS and with a Japanese visual novel strapped on. Honestly, the gameplay itself is pretty fun! You play as a trauma surgeon and you have to operate on patients, mostly fighting off a science fiction bioengineered super virus called G.U.I.L.T. It stands for something, I don't know what. You have about 10 or so tools at your disposal during surgery, things like a pump to suck out goop, magical healing gel, a syringe to inject medicines, a scalpel, and whatever the tool used to put in stitches is called. The game is entirely on the touch screen and I have to say, it's implemented very well. You have a nurse who "helps" you by giving you instructions on what you need to do and also very unhelpfully interrupting you with random shouts of "Doctor!" when you mess up. Most surgeries take only a few minutes max so you'll be working literally as fast as you possibly can. While you're operating, you monitor the patients vitals which start at 99 and when they get to 0, another doctor will kick you out and take over. In other words the patient dies but the game never actually kills them. In fact, the only time anyone dies in the game is when you are defusing a bomb and it explodes in your face, killing you. I found that kind of interesting. In between fighting strains of GUILT, you'll do random other things like the previously mentioned bomb defusal stage. I failed a lot.

    I think the main reason why this game is so traumatic is that it's short and incredibly intense bursts of action that need to be executed almost perfectly. The only other time I've felt this way playing a game was when I beat _Little Nemo_ on the NES. Again and again and again until you get it perfectly. You'll make it through the entire surgery and then at the very last part, the patient will go to 0 and it's all over. I think I had to attempt each surgery at least 5 times. In fact, a coping mechanism I developed was to just not even try or expect to beat the surgery on the first time. "It's just to learn what to do" I would tell myself. By my gosh, manipulating the stylus as fast as you possibly can while watching 5 things closely is just stressful! It's traumatic!

    Back during my initial run with the DS in 2005 I actually picked this game up new. I'm not sure how I knew about it. The thing is, the game is fun! It's a fun game that's also incredibly intense, stressful, and frustrating. During my play through there were several times I literally threw the stylus down in a fit or rage. When I owned it back in the day, I actually have a distinct memory of standing in my room, trying and failing again and again on a certain stage, and thinking to myself "If I don't stop playing this I'm going to break my DS" so I shut it off, walked away, and literally never picked it back up ever again. _Until now_. I made heavy use of a walkthrough (shoutout u/strawhat on GameFAQs) and the absolute king that recorded a longplay on YouTube. It's kind of funny to think about using a walkthrough for a board game like Operation, but it really was useful with specific strategies and techniques. "Ignore this", "Pay attention to that" kind of notes. Very helpful! I'm not going to lie to you, I seriously considered rage quitting this game again but I persevered and beat it! After the main story completion there are a few bonus stages that are even harder. I didn't even attempt them, I just watched someone on YouTube play them and that was good enough. And the reward for doing all that extra stuff? Literally a quote from the book of Revelations lol. Yeah, not worth it!

    I should note about the visual novel aspect of this game. Here's the thing, if you hit Select during the visual novel parts, it will just blaze through all the dialog. I made heavy use of it. I love the idea of the visual novel, but the actual story is just so ridiculous it wasn't that interesting. Think if there was some crazy Japanese version of a show like _E.R._, just not interesting. However, the music in this game is really quite excellent and I still got an ample dose even as the novel parts flew by. The whole atmosphere of the game is quite charming and interesting, just the story and dialog are dumb.

    So there you have it. I beat _Trauma Center_ 20 years later and didn't even break my DS. Oh, and I figured out why the game is so hard. Look at the main guy's hair on the box art. His hair is in face! Dude is doing open heart surgery and can't even see anything.
  date: 3/2/26
  wiki: https://en.wikipedia.org/wiki/Trauma_Center:_Under_the_Knife

- title: "The Legend of Zelda: Phantom Hourglass"
  platform: Nintendo DS
  developer: Nintendo EAD
  publisher: Nintendo
  year: 2007
  image: https://upload.wikimedia.org/wikipedia/en/5/5e/The_Legend_of_Zelda_Phantom_Hourglass_Game_Cover.jpg
  text: |
    I played _Phantom Hourglass_ for only a few minutes back in the day. For some reason I always kind of wrote it off as a stupid portable touch screen gimmick game. I remember a couple of  years ago I was chatting with a friend who mentioned _Phantom Hourglass_ was one of their favorite DS games and I silently judged them extremely hard for that. However, after being really charmed by the last couple of DS games I've played through, I decided I'd give it a second look. I'm sure glad I did!

    _Wind Waker_ was always my favorite _Zelda_ title (until I played through _Twilight Princess_ in 2024, that is). I just love the cel shaded graphics, having been charmed by that style by another one of my all time favorite Dreamcast games, _Jet Grind Radio_. I love how bright and colorful and expressive all the characters are. We actually preordered _Wind Waker_ back in 2003 and even got the very neat _Ocarina of Time/Master Quest_ promo disc. It's been a while since I played _Wind Waker_, but after finally playing _Twilight Princess HD_, I can understand why some were a little disappointed by it. Understanding that _Twilight Princess_ was released only a year before _Phantom Hourglass_, I can also understand why a lot of people wrote the DS offerings off as dumb novelties. However, I was really surprised just how much they packed into Phantom Hourglass.

    I suppose it's a bit disingenuous to say _Phantom Hourglass_ is _packed_ with content - it's not. It's actually fairly short. The final item, the hammer, is a lot of fun to use but it felt like I hardly got to use it at all. However, I was really impressed how well a fully 3D world worked on the DS. _Phantom Hourglass_ actually feels quite a bit more ambitious compared to a lot of even first-party games on the DS. The game is entirely controlled with the touch screen, something that remains quite controversial to this day. But I actually really enjoyed the freedom the touch screen gave me. Some of the buttons are used as more like hotkeys for certain touch screen items, which feels like a great way to allow a more experienced player to use more advanced techniques while not necessarily punishing people who only use the touch screen.

    I actually loved how well the _Wind Waker_ aesthetic translated to the DS. Rather than having to do an annoying spell to get your ship to go in the right direction, you just draw a path on a map and along the way you'll be ambushed by random enemies which would be annoying, but your ship has an awesome cannon that you can blast away with. Sometimes seagulls will follow you and you can even nail them which feels wrong but I like it. The top screen is mostly just used as a map, but you can draw on it to keep notes and there are some puzzles that require you to draw lines to find an intersection or something. However, during the boss fights, the top and bottom screen both show the fully 3D environment and I was really entertained to see how the developers made very clever use of the top screen to show what the large boss fights were doing up there. For example, one boss fight had you throwing bombs onto updrafts to send them to the top screen to attack the boss. Maybe I underestimate the power of the DS but _Phantom Hourglass_ really felt like they were pushing the console to it's full potential.

    A criticism I have is that there's kind of a core dungeon you have to return to several times. As you progress and get new items, certain shortcuts open up to allow you to skip some of the puzzles, but I just found myself mostly dreading having to deal with retreading the past sections. It's not a _huge_ problem since they allow you to skip about half of the dungeon using a warp, but I just felt like it was a bit clunky and would have preferred an all new dungeon instead of just a new section of the old one opening up.

    All in all, I really found myself enjoying _Phantom Hourglass_. I would recommend anyone give it a shot even if you are a hardcore Zelda fan or a newcomer. I think there's a lot to really enjoy about it if you're willing to look past some of the cultural milieu that surrounds the game. I'm looking forward to my playthrough of it's sequel, _Spirit Tracks_.
