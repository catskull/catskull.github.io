  wiki: https://en.wikipedia.org/wiki/The_Legend_of_Zelda:_Phantom_Hourglass

- title: "Trauma Center: Under the Knife 2"
  platform: Nintendo DS
  developer: Vanguard
  publisher: Atlus
  year: 2008
  image: https://upload.wikimedia.org/wikipedia/en/2/21/Trauma_Center_-_Under_the_Knife_2_Coverart.png
  text: |
    I suppose I have a bit of stockholm syndrome when it comes to _Trauma Center_. I think there's something cathartic about having to dedicate 110% of my attention to fine detail gameplay. Fortunately, I feel pretty strongly that _Under the Knife 2_ improves on it's predecessor in every way imaginable.

    First of all, the game is a heck of a lot easier. This is because, as you can tell from the box art, the character you play as Derek finally got a haircut so he can properly see while operating. Beyond that, they added 3 difficulty modes that can be chosen at any time - Easy, Normal, and Hard. I played the whole game on Normal with the exception of the final operation which I eventually had to bump down to easy mode on. I feel pretty confidently that with this new difficulty system, the first game would for sure be on hard. Normal felt _just right_ to me. A lot of the operations I was able to get through only having to retry a few times, some I didn't even have to retry on at all.

    I feel like they did a much better job giving this game more variety as well. The first game had a few introductory missions but once you got to the main "GUILT" viruses it was mostly just rinse and repeat with those a lot of times. This game changed it up, I didn't feel like I was just repeating the same operations over and over again with slight variations.

    Perhaps I was getting cocky, but towards the end I almost kind of missed the extreme difficulty of the first game. That is until I got to the final mission. I probably had to attempt it 30 times. I nearly got to the point I was at the first time I tried to play the first game where I thought to myself "I either need to put this game down or I'm going to break my DS". It's funny how about 12 hours and a decent night's sleep really helps when you're stuck on a problem. Picking it back up the next day, I was able to beat the final mission after only two attempts.

    As usual the music and overall aesthetics are quite the bop. They packed the cartridge with a lot more voice samples as well, some of which are pretty funny. My favorite is when Derek says "I'm a doctor!" as if that's news to anyone. I can't really say much about the story since I pressed select to blaze through all the dialog segments, but from what I could tell it was quite a bit more involved and less randomly insane than the first game.

    If you're wanting to play a _Trauma Center_ game for DS, I'd recommend both games. However I think you should probably start with the second game just to help get your bearings a bit more before throwing yourself at the extreme difficulty of the first game. Both are really quite great and I wish we'd have gotten a third! There's a few games on the Wii that I don't see myself getting into, I'm just not really a fan of the Wiimote.
  date: 3/12/26
  wiki: https://en.wikipedia.org/wiki/Trauma_Center:_Under_the_Knife_2

- title: Retro Game Challenge 2
  platform: Nintendo DS
  developer: indieszero
  publisher: Namco Bandai Games
  year: 2009
  image: https://upload.wikimedia.org/wikipedia/en/a/a4/Retro_Game_Challenge_2_cover_art.png
  text: |
    Near the end of 2025 I finally went back and beat [_Retro Game Challenge_](https://catskull.net/every-game-I-beat-in-2025.html#retro-game-challenge). I've had a real soft spot for that game since it's US release, and I eagerly awaited it's sequel to be localize but that never happened. Finally in 2014, an excellent fan translation launched. The defunct (?) blog _Tiny Cartridge_ even released some box art for it's Patreon backers which was the first time I ever became a Patreon for anything. Since then, my home made box has housed my r4 card when it's not in use. The second game is more of the same as the first, but it's probably just a little bit better in every way. There's a slew of new games, but this time it's not limited to a fictional Famicom system, but spread out among a few different consoles in addition to the Famiclone from the first game. There's a fun Pac-Man clone, a karate fighting game for some kind of PC Engine clone, a platformer similar to Gargoyle's Quest, a sort of silly visual novel (and a sequel/part 2 the main game doesn't even make you play) for the disk system add-on, a pretty cool top down shooter, a Tetris-like for the Game Boy clone, a nice RPG for the game's Game Boy Color clone (and sequel to the RPG from the first game), and a 16-bit sequel to the Gargoyle's Quest style game. I wish there were more 16-bit style games, but the variety in systems is a fun treat compared to the strictly 8-bit of the first game. It's impressive to me how fully fleshed out all the games feel. It doesn't feel like you're playing some half-baked minigame, it feels like you're playing some long lost games from the era. I can understand how this one didn't get an English localization. It's got an RPG and a visual novel. The visual novel especially is incredibly text heavy and that genre is still almost completely absent from the western market. I'll admit the visual novel for me was kind of a slog and not very fun, but I still enjoyed it for what it was. Two cool features of the sequel are that now some games have 2-player mode where you can play with or against your in-game friend. I wish they would have added proper multiplayer for these because some of them would be legitimately fun to go head to head on, especially if it didn't require an extra cartridge. Another great addition is that you can go visit "Funcoland", the in-game video game store, and test out some games there. For this they brought many of the games from the first game so you can still get a good taste for them. A lot of them are special editions such as a tournament edition that caps the time limit. I didn't spend a ton of time on them, but it really goes a long way to round out the whole package for me. I can't speak highly enough of the fan translation on this one. Again, they translated an entire two-part visual novel which is just incredible. As a post-game challenge, you're given the task of beating every game but I didn't take that challenge since it was post-credits. I think if you were on a long trip and got bored enough, I could see knocking them out one by one, but because they are like real/full games and not dumb minigames, it would take quite a bit of time. One unexpected feature of the unlocalized version is that they left the in-game friend's voice in Japanese. You see, your friend (who is the past child version of the Game Master who's making you play the games and dishing out the challenges) is watching you play. The bottom screen shows you and your friend looking at the TV, which is on the top screen and has the actual gameplay. As you play, your friend will say things as things happen in the game. If you beat a boss he'll should "Oh yeah!" or something like that. With Retro Game Challenge 1, the English voice over got kind of annoying at times. With the sequel, he only speaks Japanese so it's just a lot less annoying and more funny to me. I swear there are voice clips in this game that would be considered racist in any other context but in a game that is 100% Japanese, I feel better about laughing about them. In the sequel, apparently you can even unlock additional in-game voices. The only one I got sounds like a Japanese game show audience reaction, which is awesome. It's really too bad we didn't get this game in the West but I can completely understand why. It's a heavily Japanese focused game based on a very specific Japanese TV show which just sounds like a total legal and licensing nightmare. I wish they would have just made it a generic game to save themselves this headache. The developer went on to make the _NES Remix_ games but I've never really wanted to play them. I'm not that interested in doing random challenges for _actual_ NES games, it's the awesome would-be fictional games that are super interesting to me. If you haven't played either game, I think you're totally safe to give either the first or second a shot. I guess they came out with a remastered collection on the Switch that contains both games, but it's only been released in Japan and I doubt we'll see it here at any point. It's too bad because from what I can tell, they did a really excellent job porting the DS games to the Switch. I looked up importing a copy just to have in my collection but it's just a little too much for a game I wouldn't really be able to play. If I ever go back to Japan I'll add it on my list of things to look out for because it would be really cool to have it in my collection!
  date: 3/15/26
  wiki: https://en.wikipedia.org/wiki/Retro_Game_Challenge_2

- title: Contact
  platform: Nintendo DS
  developer: Grasshopper Manufacture
  publisher: Atlus USA
  year: 2006
  image: /public/media/posts/games/2026/contact.jpg
  text: |
    Another DS game in the books! This is another one off my "GameStop DS clearance search 2013" list. As I mentioned last year on [_Retro Game Challenge_](https://catskull.net/every-game-I-beat-in-2025.html#retro-game-challenge), there was a time when GameStop was aggressively trying to get rid of their entire DS library, right around the time that the 3DS was in it's height. One of the games that was around the $5 mark that I'd snag was _Contact_. I currently own two loose copies complete with my custom printed box art and one of those official blank DS game cases Nintendo used to sell.

    I'm not totally sure how I knew about _Contact_. I have vague memory of knowing about it back during the time it was first released. It seems like it made kind of a splash in the US since it came out about the same time as _Mother 3_ but it was fairly clear we weren't going to be seeing _Mother 3_ here. Contact is often compared to _Earthbound_, and I think it's pretty clear it's at least partly inspired by it.

    In _Contact_ you play as yourself. You, the player, are interacting with the characters and events in the game. Like _Earthbound_, _Contact_ asks your name, your favorite food, etc. The basic synopsis is that there's a Professor flying around in his space ship with his dog, Mochi, who wants to be a cat and acts like a cat. The only reason I know that it's a dog and not a cat is that I read the manual and it specifically tells you that its a dog. I'm really struggling to write about this game because there's just a lot of interesting stuff that's hard to describe. You, the player, control Terry. I don't want to spoil the story, but I think the best way to describe the exact setup is that the Professor enlists your help to fix his space ship by taking control of Terry. You control Terry, but you are _not_ Terry. At the end of the game, Terry actually confronts you as the player for controlling him. From the Professor and your viewpoint, the antagonists are a band of space terrorists called the "CosmoNOTs" (Cosmic Nihilist Organization for Terror). What exactly their beef with the Professor is, it's not entirely clear. All I know is that one day Terry is chilling on a park bench when suddenly the Professor shows up in his spaceship and I think essentially abducts Terry and enslaves him with a wristband that allows you, the player, to control him.

    If you look at screenshots of the game, you'll notice that the Professor and his spaceship are drawn in a more 8-bit style of artwork, while Terry and everything else in the game is in a more detailed 32-bit style. This to me says that the Professor is really foreign in the game's world, which makes me less sympathetic to his plight. The CosmoNOTs look like Terry and seemingly belong in the world, while the Professor is something else. After the Professor abducts Terry, he next wakes up washed up on a beach. That feels like not a great indication that the Professor wants to help Terry and kind of confirms he's just using you and Terry. The game world is organized as a globe/planet with distinct islands you navigate to as the Professor tracks down cells to fix his spaceship. Even though the Professor has a ship capable of space flight, he says that he found a sunken pirate ship and somehow attaches his space ship to it. As Terry, you have a bedroom on the ship where you sleep to save the game, a bathtub where you soak to restore health, a closet where you change clothes to activate different abilities, and a kitchen where you cook food (as long as you're wearing the chef clothes). Then randomly you can walk into on room on the ship that's the Professor's ship. Am I making any sense at all? 32-bit Terry will walk into the Professor's 8-bit ship. They can fully interact. The professor never leaves his ship room, but if you die you'll be resurrected in your bed on board and Mochi (who is also 8-bit) will be resting on top of you while you sleep. So it seems like the 8-bit and 32-bit worlds are fully linked. You'd sort of think Terry would reduce to 8-bit when he enters the Professor's world, but he doesn't.

    I think that is essentially what _Contact_ is about, at it's core. It's about making contact between different worlds. The Professor making contact with you, the player. You, the player, making contact with Terry. The Professor making contact with Terry. Three worlds collide. I should also note that with the exception of Terry's confrontation at the end of the game, nothing in Terry's 32-bit world ever directly makes contact with you, the player. There is contact between the Professor and other things in Terry's world, such as a part where Mochi heroically saves Terry. After you have Terry sleep to save the game, while he is still sleeping, you interact with the Professor and Mochi. It kind of becomes like a Tamagochi. You can have Mochi play with the computer, sleep on the bed, or scratch the scratch thing But if you're really a pro you'll know you have to do a special flick motion to pet him and then he'll lay down and you can tap the crap out of him to make him super happy. It's just interesting to me that you, the player, can interact with the Professor's world directly, but the Professor is deliberate about making sure that only happens when Terry isn't around.

    The gameplay itself is a real time turn based RPG. The combat system reminds me the most of _Star Wars: Knights of the Old Republic_ which is essentially an "MMO" style of combat. Terry will attack at a regular interval, the enemy will attack back at a regular interval. You can use special abilities but most of the time you're just kind of sitting there while it happens. One of the quirks of the game is that you have "decals" that you apply to Terry's world. There's a Mochi decal which will summon him and depending on how much you've been playing with him, he'll do damage to enemies. There's also stat decals you can apply to Terry in the menu that will buff certain traits. I guess I should mention that the game's mechanics are pretty complex. There are like 30 individual stats that all do random things such as "Fame" and "Strength". Your progression happens real time and it's just based on how much you do that thing. For my playthrough there was a decent amount of grind. Just camping out by a bathtub and killing a room of enemies, then healing and doing it again. I'm not sure if I had to do it, but the game can be pretty punishing especially considering that the combat is mostly just random. If you get unlucky it's pretty easy to take a ton of damage quickly and end up dead. If you happen to fight two or more enemies at once, they'll interrupt your attack cycle so you'll just get pounded without doing any damage at all. That's when things can get really tricky so it's best to just run away and try again.

    One of the criticisms this game gets is the "digestion system". Yes you read that right. Terry can eat food that heals him or does other stat buffs/debuffs. Each food item has it's own "digestion period" that fills up his stomach. If his stomach is full, he can't eat anything until he's digested some. Each food digests at different rates and the digestion period is also the timer for how long the buff will last. It gets kind of complex. As mentioned before, Terry can also cook food but honestly unless you just really love that sort of thing, it's probably not worth your time. This is because you can simply buy potions which act as a food item but take up next to no digestion space and digest super fast. It's a lot simpler than trying to deal with a bunch of food, especially if you're in a boss fight. I think the whole cooking and food mechanic is interesting, but the implementation kind of limits it's potential. I'm glad it's there as an option, but I just bought potions. There are three weapon types - fist, sword, and hammer. There are about 100 unique weapons in the game and they all will fall into one of these three categories. Each weapon subtype is also a skill you can level up. For my playthrough I ended up using hammers about 90% of the time, which ends up having a snowball effect because then your other weapons will be super under leveled and can't really be used later on unless you grind that weapon for a while. At one point I wanted to use a fist weapon but I was super under leveled and had to grind it for a while before it was really very useful.

    I found the graphics and music to be overall really awesome. There is some truly beautiful artwork and some really well done music. There are also some really annoying sound effects. For example, sometimes the Professor will call Terry and while this is happening there is a super loud telegraph style beeping sound. It wouldn't be that bad but it truly is super duper loud. Also there are some small voice clips that are charming but overdone. For example there's a "hiccup" voice clip that's not offensive on it's own, but you'll hear it like 30 times in the span of a minute and it just gets old. The music really pops off at times. The issue is that the battle music will interrupt and restart the music so you never really get to hear it for longer than a few seconds at a time unless you stop to listen to it. Maybe that's okay. I just think they could have let the main music play out a bit more.

    In case you can't tell, this game really gripped me. Is it the greatest game of all time? Not at all. There are a lot of things that are just unintuitive and kind of smell of plain bad game design. It's also fairly short - my playthrough lasted just over 12 hours and that's even with at least 2 hours total of grinding. The pacing is also not very consistent. Some of the islands drag on forever, while others are over before you even get a good feel for them. There are 5 main islands you progress through. The third island is an Egypt style place where you wander around in pyramids for what feels like forever with tons of hidden passages and things to explore. The fourth is just a giant shopping center called "Habara" and is very clearly supposed to be one of those giant _Don Quixote_ style stores you'll find in Akihabara, Tokyo. You'll just breeze right through it despite it having some of the best music and most unique settings in the game!

    For some reason, I had the impression that this game was unfinished and had to be rushed out for release. I swear I read articles that talked about that, but as I played through this time I found less evidence of that. However, it does feel pretty unfinished. In fact, in a post-game cutscene, the Professor mentions that the game had to be rushed out before it was finished. It's not clear to me if this is supposed to be taken literally or not. I also had the impression that I've beaten this game before, back when I first cleaned out a GameStop for their copies, but there is a _lot_ of content I just don't really remember.

    Having now beaten every entry in the _Mother_ series as well as _Contact_, I am a bigger fan of this game than I think I would otherwise expect myself to be. The whole premise is just really unique and interesting to me. It leaves me wanting more. I'm scouring the net for more info. I've read interviews with the localization team, I found scans of the manual and read the whole thing, I'm looking at 20 year old GamFAQs discussion threads about the game. I've watched every YouTube review I could find. I don't think anything I've seen or read really quite nails what _Contact_ is. I felt all of them missed pretty big aspects of the game, and criticisms felt more like misunderstandings of the game. Yes, it's flawed, often in big ways. But man, there just isn't anything else quite like _Contact_. I've never played any of _Grasshoper Manufacture_'s games and honestly I doubt I will. Supposedly a sequel was planned at some point but it's been 20 years since we've heard anything about that so I'm not holding my breath. However, I know for a fact that this game is underrated. It's one of the best games on the DS and possibly one of the best RPGs of all time. There's so much untapped potential. I feel that it could be ported to the Switch or another console very easily and that a lot of the rough edges could be evened out. They could expand on the story and make it a true masterpiece, there's already so much here that's excellent.

    After Terry is abducted/joins the Professor, his Mom calls his cell phone to tell him to come home for dinner. "We're sorry, the number you have dialed is in space", his answering machine responds. After the game is over and the Professor has left Terry on the starting island alone and abandoned, Mint, the games main antagonist, final boss, and leader of the CosmoNOTs hears Terry's distress call and comes to rescue him. During the course of the game, she's developed feelings for Terry. She picks him up in her flying car and takes him back home, something the Professor promised Terry he'd do after helping him. Before leaving, she shyly asks if next time they meet, they can work together. "Next time we meet... will you help me?" The final scene of the game shows Terry walking into his house where his Mother is waiting for him to come home for dinner.
  date: 3/20/26
  wiki: https://en.wikipedia.org/wiki/Contact_(video_game)

- title: ActRaiser
  platform: SNES
  developer: Quintet
  publisher: Enix
  year: 1991
  image: /public/media/posts/games/2026/actraiser.jpg
  text: |
    _ActRaiser_ is a hybrid platforming/city sim "RPG". I put that in loose terms because there are certainly RPG elements, but it's far from the usual fare. It was released incredibly early in the SNES' lifespan and might actually be an early masterpiece. If you told me it was released in 1997 I'd probably believe it without blinking. But the fact that it came out in 1990 (in Japan) and that it's unique hybrid gameplay still hasn't been done again (not even by it's own sequel) is really quite astounding.

    I honestly can't remember when or how I learned about _ActRaiser_. I seem to have an extremely vague recollection of maybe playing it a friend's house as a kid. It might have been found during our initial push into SNES emulation in the early 2000's. I was charmed by the straightforward platforming levels, and I found the city sim parts very fun and natural. This is coming from someone who has never been able to mentally grasp _SimCity_, or really any other sim other than maybe _Rollercoaster Tycoon_.

    For some reason, the platforming levels reminded me of _Super Star Wars_ if that game was actually fun. For one, the soundtrack is absolutely _banging_. No surprise once I saw the credits - the one and only Yuzo Koshiro blessed us with a great OST. Between him and Yoko Shimomura, the SNES has some really amazing soundtracks. The graphics are all well done but also kind of crappy in a charming way. I found myself smiling and laughing at all the random devils and dwarves. Your warrior dude makes the most epic "hah" sound when you swing your sword. Honestly the whole soundtrack is loaded with samples that sound way, way ahead of their time.

    I should back up a bit. You play God. I'm not going to go into the backstory but basically you live in a flying palace (in heaven I guess?) and you cruise around to 6 different towns and the people pray to you. Each town starts with a platforming level, and is followed by a city building section, and then another platforming level and boss fight. I guess you, as God, possess a statue of a warrior and that's how you do the platforming levels. For the city building parts, you control a little cherub dude with a cute bum flying around. There are certain spots on the ground where monsters spawn and they'll go mess with the town and burn down homes and stuff, so you have a bow you shoot them with to keep the peace while the townspeople build. You have a few miracles you can perform such as lightning strike that are almost exclusively used to clear land for the people to build on. From time to time, they'll give you an offering of some random crap they found that are little power ups and such. Sometimes there's a "crisis" where you have to deal with something like a dude lighting his house on fire. If you've ever played _Black & White_, it's kind of like that. Each town has one crisis I think.

    Some of the offerings can be taken to other towns to solve problems there. For example one town has "herbs" that you have to take to another town to cure the plague. You guide the town on where to build, and when the town gets near one of the monster portals, they'll come out and do this crazy ritual to seal the monster portal up and stop monsters from spawning. Once all the monster portals are sealed, the townspeople will pray again, freaking out about some random evil thing that is happening. When that happens, you return to sky palace and enter the second platforming stage and beat the boss. After that, the town is pretty much just peaceful but there are usually a few extra things to do.

    Your God character gains levels as the total population of the towns increases. It's mostly natural and straightforward, but there are some hidden mechanics you sort of get a feel for. For example, the towns will "level up" and start building more "efficient" buildings that just increase the population. However, they don't tear down their older, less efficient buildings, so it's up to you to wreak havoc with earthquakes and lightning strikes to make them rebuild better buildings. You'd think the townspeople would get mad about you wrecking their stuff, but they do not care at all. There's some complex formula that takes your score during the platforming stages and how many of the monsters you kill during the city building that will determine how many people will end up living in the town. I think the maximum achievable level is 17, but I only got to 16.

    It's really not a long game, each town only takes about 45 minutes to an hour, you can easily beat the whole game in well under 8 hours. I started playing on a whim and really had a hard time putting it down. The core loop of platformer, city building, platformer, next town really got a grip on me. I was really caught up in the short yet rewarding levels. Not to mention the already mentioned banging soundtrack and hilarious graphics. One of the monsters that spawn in the overworld is a little devil dude who also has a little bum hanging out!

    I guess the original Japanese release was way harder than the American release. It's really not hard. I used save states but you have plenty of extra lives and the game doesn't really punish you for dying. For example if you make it through the platforming level and die during the boss fight, it will respawn you at the boss fight. I never actually got a game over.

    I think _ActRaiser_ is a really excellent game and it's crazy impressive to me how much they did just months after the console's release. The folks at Quintet really knew their stuff. There is a sequel, also for the SNES but it dumped the citybuilding parts. I remember trying it out and being super disappointed, and right now the premise of a pure platformer isn't something I'm feeling interested in. Like, I want to be _God_, not just some warrior dude in a generic platformer, you know?
  date: 4/1/26
  wiki: https://en.wikipedia.org/wiki/ActRaiser

