- title: Pokémon Crystal
  platform: Gameboy Color 
  developer: Game Freak
  publisher: Nintendo
  year: 2001
  image: https://upload.wikimedia.org/wikipedia/en/8/84/Pokémon_Crystal_box_art.png
  text: |
    Back then I thought it was pretty cool that they included all of the gen 1 Kanto region in the post-game, and I still think it's pretty cool. It felt like you get two games for the price of one! Revisiting it now, the post-game felt a but under-polished to me. A lot of the main places are just closed now with little logical explanation, and the specific things you need to do to unlock the next town felt pretty unintuitive, but hey I'm not going to complain too much. It was a bit funny because the main protagonist of gen 1, Red, is missing. His mom is straight up like "I haven't heard from him in a long time, I hope he's okay." Turns out, he's just chilling in a cave. He serves as the last main boss of the entire game and again, I didn't struggle too much with any of his Urmans despite the fact they were quite a bit higher leveled than anything else I'd come across. The one that really wrecked me was the Snorlax. The issue is he has "rest" which fully heals him, and I didn't have any Urmans that could do much damage. It took about 5 or 6 cuts with Davey Jr. to knock him out, and by the third or fourth he'd use rest and fully heal. I had plenty of potions but nearly ran out of PP! I guess eventually I got lucky that the CPU just used some bad logic but in a real battle I would have lost for sure.

    A last criticism I'd have is that the mix of Pokemon is really not great. Caves are still filled with Geodudes and Zubats galore. Magikarps, Goldeens, and Tentacools plauge the 7 seas. Even trainer battles will reuse the same Pokemon again and again. I really wish I would have been able to at least _see_ the new Pokemon more naturally, especially considering you can go back to Kanto to see and capture the rest of the gen 1 lineup.

    I still have pretty fond memories of Pokémon Crystal and I did enjoy my time with it now. It's just not quite what I remembered it to be. I think gen 1 still holds my heart. I'm debating if I should try out gen 3, but for some reason I feel like I got a decent chunk into Ruby a few years ago and bounced off it in some frustration but I can't remember the specifics. Maybe Platinum on my DS since I really love that console.
  date: 1/3/26
  wiki: https://en.wikipedia.org/wiki/Freelancer_(video_game)

- title: Pokémon Platinum
  platform: Nintendo DS
  developer: Game Freak
  publisher: Nintendo
  year: 2009
  image: https://upload.wikimedia.org/wikipedia/en/c/ca/Pokemon_Platinum.png
  text: |
    Since I enjoyed Crystal, I thought I'd see what a more "modern" Pokémon game might look like. Yes, I'm old enough that I consider a game that's old enough to vote "modern" because Crystal came out when I was in like 5th grade and Platinum came out my senior year of high school. At that time, I was way too cool to play Pokémon... well, that's not entirely true. I remember taking my DMG to school my senior year to play my copy of Red but that was mostly a publicity stunt. Up until now, I've never experienced anything past gen 2. I have to say though, _Platinum_ is a great game! I'm biased because I really just love the Nintendo DS Lite. The screens, the resolution, the bit crushed audio, it's just perfect. Platinum looks and sounds amazing. Game Freak really nailed their execution of the touch screen as well. It just serves as a platform to press buttons, there are no gimmicks. I actually used the touch screen a lot when selecting items or moves, it just felt faster to me and is easy to do even with a full finger, not even just a fingernail heaven forbid the stylus.

    Instead of the classic _Team Rocket_, this game puts you up against _Team Galactic_ which has something to do with them wanting to make a new world or something. Instead of them being just a thorn in the side of the main gym badge journey, their storyline actually felt thought out and was pretty interesting. The main leader dude is some nut job who wants to like start a whole new world that's perfect or something by doing something evil with Pokémon... I don't know, I wasn't really paying attention. At one point you go into this "upside down" shadow world where gravity is all mixed up. They made nice use of the hardware to do a cool 2.5D layout. Basically you just walk on walls, and some times the map goes isomorphic instead of just 2D. As a little gimmick and aside, I thought it was very well executed. The whole experience there only lasts a few minutes and there's not even random encounters so you really are just focusing on a complete twist on the normal formula while you navigate the strange puzzle layout. There was a part where you swim up a waterfall that is flowing up. Does that mean you swam up or down the waterfall? You swim down an up waterfall, make sense? It's just cool. Eventually you beat the boss dude and then have to take out this crazy shadow Pokémon which was easy enough but I was under-prepped so I spent a long time trying to catch it and eventually got lucky.

    The later games are much less "rock paper scissors" mechanics and teams and Pokémon are a lot better balanced so simply sticking with a single type can't 1-shot every other battle in the game. I started with the grass starter which actually kind of felt like a mistake because he never really learned any grass type moves that dominated. Instead, I relied on it's dark move and _Earthquake_, a ground type. I also got a Magikarp and evolved it to a Gyrados which was pretty good with it's Dragon and Ice moves, though I did eventually use it as my HM beast for both Surf and Waterfall, but luckily those moves are actually pretty tough. I was also given an Evee by an NPC so I raised it up into the psychic evolution, which actually ended up not really being all that useful. Finally that legendary shadow Pokémon I caught is a ghost/psychic type that was pretty good as well. Thanks to the fresh balance, the gyms were not a complete cakewalk and the elite four actually gave me a decent run for my money. I did actually have to make strategic use of a lot of potions and revives during a few of the battles. Due to having essentially four "mains", I think they were all a bit under leveled for the final trainer, but I managed. I had a fun and tricky time trying to understand the strengths and weaknesses of the new types so I had to do a few of the battles more than once when I accidentally sent out a mon that was super weak to the opponent and I'd get one-shotted. Again I wasn't really paying enough attention to fully understand the type dynamics but I survived well enough.

    My play through took me just shy of 30 hours. I didn't do any of the WiFi stuff since that's all offline and I really can't be chuffed to deal with the fan servers. I also didn't really do any of the post-game "battle island" stuff at all. I felt that the main campaign and story was quite enough of what I got, but if I was a super fan back in 2009 the rest of the content would have been fun to play, especially if I had friends to compete with online.
  date: 1/13/25
  wiki: https://en.wikipedia.org/wiki/Pokémon_Platinum

- title: PowerWash Simulator
  platform: Apple Arcade
  developer: FuturLab
  publisher: Apple
  year: 2022
  image: /public/media/posts/games/2026/pws.jpg
  text: |
    I think that here in the United States we call it pressure washing, not power washing. Nevertheless, pressure washing is something that is relaxing to do. I myself own a pressure washer and spraying my garage to the point that I could literally eat off of it is something I have spent time on. I'm not sure when I heard about this game, probably saw it on some cursed short form video platform. I was interested in playing it for a while, but it wasn't available on macOS until December 2025 thanks to Apple Arcade. First an original Katamari game, now this? What's next? _Freelancer???_

    The premise is incredibly simple. You spray things off to clean them. "Things" being anything from a bike to a UFO. There are some incredibly rudimentary mechanics such as the surface material of what you're spraying mildly influencing how easily the grime comes off, but it's mostly safe to ignore completely. You can buy better pressure washers (2 in addition to the one you start with), wand extensions, and a twirly spray nozzle. You can also buy a cleaning agent spray bottle with cleaning chemicals that need to be refilled but I didn't use them at all. At the very end of the game you can buy a fancy 3-nozzled tip that is pretty useful. But really the core gameplay is just "spray things". It's not necessarily "fun" but it is relaxing in a sense. I watched Cowboy Bebop, the Pokémon cartoon, and a few Ken Burns documentaries as I played through the game. It might be a bit _too_ addicting so I'm glad it's over now.

    I actually spent quite a bit of time in December playing this one but wasn't able to get it done before the end of the year. Thanks to the Apple Arcade release, it's available on all the Apple platforms so my son and I briefly experimented with the multiplayer with him on the Apple TV and me on my Macbook but it didn't last long. I think it's just a bit too tricky for little kids to figure out. Still, they all liked watching me play. Apparently there is some story to the game but I completely missed all of it.
  date: 1/17/25
  wiki: https://en.wikipedia.org/wiki/PowerWash_Simulator

- title: Banjo-Kazooie
  platform: Nintendo 64 (recompiled)
  developer: Rare
  publisher: Nintendo
  year: 1998
  image: /public/media/posts/games/2026/banjo.jpg
  text: |
    Growing up, we never actually owned a copy of _Banjo-Kazooie_, but it was a game common enough that I had a chance to play it from time to time. I remember my cousin actually owned it and would let me play it. I liked that after you'd beaten the different levels, you could go back in to them and play it again. I particularly enjoyed the ability to transform into different animals, my favorite was the bee since you could fly around.

    It's a bit wild to think how good Rare in the 90's was. In a lot of ways, they were _the_ first party developer for the Nintendo 64. Anything with a Rare logo on it was basically gold. From _Diddy Kong Racing_ to _Donkey Kong 64_, I enjoyed anything they made and then some.

    Later on when I was in middle school, I ended up tracking down a copy of _Banjo_ and played through it. I remember coming home late after a dance and finally finishing off the final boss for the first time. Since then, I think I've played through it one more time, probably around 2018 when I bought an Xbox One and a copy of Rare Replay.

    The new hotness in the Nintendo 64 scene is these "recomps". I'm not totally sure what kind of black magic is involved, but they're able to take a legally obtained ROM dump of an N64 game and "recompile" it for modern platforms, and luckily they're pretty well supported on macOS. This recomp is quite good, upscaling the models and with a few quality of life tweaks such as saving notes in between levels. You see, each level has exactly 100 "notes" to collect but if you die or leave the stage, it resets which means you need to dedicate at least enough time to find them all in a single sitting. This recomp has a nice setting to save your notes so that problem isn't an issue any more.

    That's not to say my experience was flawless. At the time of writing, there's a memory leak at the rate of about 10MB/s on macOS so you're up against that clock unless you want to crash the system. Controller support is fantastic though, and I used my official Switch Online N64 controller for the perfectly authentic experience complete with rumble and everything. The biggest issue I had was that I made it to the final boss fight, died a handful of times, and then had to go give my family some attention. When I came back the next day, there was a glitch that prevented me from triggering the final fight. I quit the game and relaunched it, but now my save file was gone! I'm not sure what happened exactly but it might have something to do with the fact that I got so close to beating the boss that it triggered the final cutscene only to die by a trailing fireball post-cutscene. I literally did beat the game, but not really! I'm putting it on this list anyways since I'm not going to go back and do it all again. I unlocked everything including all 900 notes and 99 jiggies. I feel a little bit robbed that I didn't get to actually witness the final credits, but oh well that's what I get for playing some recompiled monstrosity.

    Banjo-Kazooie is a fun game, and it mostly holds up. The recomp does have a tweak for pure analog camera control if you have a controller with a second analog stick, but since I was on my N64 controller I was stuck with the default janky camera controls. Seriously, what the heck was with 90's 3D platformers and camera issues? Mario 64 is one of the worst offenders. I do not understand how the camera could be so bad and I don't understand how it's just completely not an issue any more. What did they figure out to fix it? I'll have to pay attention to the next game I play.
  date: 2/13/26
  wiki: https://en.wikipedia.org/wiki/Banjo-Kazooie_(video_game)

- title: Far Cry 5
  platform: PC (CrossOver 26)
  developer: Ubisoft Montreal
  publisher: Ubisoft
  year: 2018
  image: https://upload.wikimedia.org/wikipedia/en/0/03/Far_Cry_5_boxshot.jpg
  text: |
    Admittedly I don't play very many "modern" games. When I do, I usually play on easy mode, because I suck at video games. However, I recently picked up an 8bitdo R8 mouse (xbox themed) and felt like I should give it a whirl with a good shooter. Maybe a year ago I gave _Far Cry 5_ a shot with crossover on my M3 Max but I sucked at it and the loading times were really long. I decided to give it another whirl to see if anything has improved in CrossOver, and I'm glad to report loading times were a non-issue for me. Maybe 5-10 seconds max from menu to gameplay.

    The core gameplay loop here is pretty fun. Just hijack a vehicle, do some stuff, kill some bad guys, rinse and repeat. I actually really loved the rural Montana setting and felt they did a great job getting the scenery right. There are enough random side roads and things going on to keep my interest, and the random things going on reward you enough that it felt worth it. I actually completed about 50% of the main campaign before I really even realized what I was supposed to be doing. As I've said before, I've found that I only really like games that are either completely linear or completely open ended. If I don't know what I'm supposed to be doing and feel like I'm not making any progress, I'll quit pretty quickly. The fact that I'm writing this means I beat the game and didn't rage quit!

    Having said all of that... the story, the dialog, the characters, quite literally everything about the game that wasn't looking at the scenery and blowing stuff up was awful. As an American, I find it quite hilarious that the absolute scariest thing a bunch of French-Canadians could come up with is a "conservative" Christian caricature. Literally every single NPC I encountered in the game was the absolute most annoying thing of all time. Luckily about 95% of the cutscenes were skippable, and I absolutely _smashed_ the escape key to exit them as soon as I possibly could. The dialog mostly consisted of "F\*\*k the f\*\*kin f\*\*kers!!!" There were even a few instances of some hard C's. Is that where we're at as a society these days? I'm not even necessarily that sensitive to foul language but the sheer amount of profanity employed by every single person in the entire game made me sympathize with the antagonists purely because they seemed to have something at least half way substantive to say, as deranged as it was. Honestly I worry about the writers of this game. Who hurt you? How do you even come up with this trash? The low point of the game for me was a mandatory mission quest where you have to follow an NPC as she recounts the tale of "The Cook" and why they call him "The Cook". Absolutely unhinged tales about "drinking their own piss" and making children watch as their parents toes were cut off and fed to them. Again, who hurt the writers? How did this make it out of the brainstorming session? Why subject the player to absurd and obscene gore for a cheap literary device to try and convince me that headshotting a single random dude should be more satisfying than the thousand other people? It's a _game_ dude. It's supposed to be _for fun_. You can edge it up, sure, but my absolute hell this game was truly unhinged. And, major spoiler alert: Apparently nothing you do in the game even matters at all! Everyone dies! The evil prophet turns out to be correct. Maybe I'm just not a fan of generic "body horror" (I am not). The game is fun! Why absolutely punish me for playing it? It felt like I was in grade school again and the odd kid who probably had access to media not appropriate for his age had me cornered on a school bus giving me a complete play-by-play of _Kill Bill Volume 2_. I also like playing games with my kids and generally speaking killing video game bad guys with a gun is not something I'm worried about, but the graphic language and depictions in this game had me closing _and_ locking my door. As someone with children who want to play games, I find it a bit insane that a game with this level of profanity and violence has the same ESRB rating as a game like Halo 3. I feel we need to make better use of the Adults Only rating, and should not simply reserve it for "sex".

    So yeah, I beat _Far Cry 5_. I stared directly into the core of "modern" games and I'm not sure how I feel about it. As someone who grew up being told _DOOM_ would make me want to commit violence and the extreme controversy surrounding _Grand Theft Auto_, I'm not sure how we got here or how this is generally considered okay. I played about 20 minutes of the standalone DLC where you're on Mars and immediately felt like that was a lot more appropriate and fun. Blasting alien spiders with a laser pistol versus seeing human bodies strung up like hunting prizes, which one do you feel better about?
  date: 2/18/26
  wiki: https://en.wikipedia.org/wiki/Far_Cry_5

- title: New Super Mario Bros.
  platform: Nintendo DS
  developer: Nintendo EAD
  publisher: Nintendo
  year: 2006
  image: https://upload.wikimedia.org/wikipedia/en/d/db/NewSuperMarioBrothers.jpg
  text: |
    Back in 2006, I think I was about 15. The DS Lite released in North America in June, the summer in between 9th and 10th grade. Where I was living in Utah, schools were split between Middle School and High School, where Middle was 8th and 9th grade, and High was 10th through 12th grade. Being the summer after finishing Middle School, it felt like a fairly major transitional period in my life. I had a friend who was a cowboy who told me there was a place in town that would hire you even if you weren't 16 yet, so I got a job there. It was a call center that was about half a step above telemarketing. I would conduct phone surveys, calling people on the phone and asking them about their recent experience at Jiffy Lube and sometimes political polling, but usually just about their most recent oil change. It was quite the place to work. I can't even remember how much I made there but it was maybe $6.15 an hour. It might have even been less. I worked there as much as I could, and with my meager savings, I just couldn't resist picking up a fresh new white DS Lite. I even convinced my best friend Nate to pick one up as well. We both picked up a single game as well - New Super Mario Bros.

    Maybe it was just the fledgling taste of freedom that my first job provided, but I have such fond memories of that time. No real responsibilities yet the ability to have some small say in how my life was going. _New Super Mario Bros._ really felt like a huge leap forward in games. You see, it was like the old fashioned _Super Mario Bros._ but also _New_. The _New_ is what was important. I remember really enjoying playing the game on my hard earned DS Lite. To this day, the DS Lite is _probably_ my favorite hand held and it might even be edging out the Dreamcast as my all time favorite system. I have talked before about how much I love it, but I just _love_ the DS Lite. The "virtual surround sound" really sounds incredible when playing at handheld length at all volume levels and the specific audio bitrate just sounds _perfect_. Cheff's kiss emoji!

    I really loved how nonchalant NSMB is. It's entirely unassuming, almost completely linear, and easy to pick up even just for two minutes. I still really love that about this game. One of my favorite features of the DS is that you can just close it and the game pauses immediately until you're ready to start playing again. When you do that with NSMB, Mario yells out "bye bye!", which is so charming coming from your now closed DS. One of my favorite memories is a small debate we had over what exactly Mario says when you beat a level. I thought he said "That's-a alright!" but Nate swore up and down he said "Breakfast tonight!" We actually looked it up on the only viable place back in 2006 - Yahoo Answers. Yahoo Answers was the best man, the best. Unsurprisingly someone had actually asked that exact question "What does Mario say at the end of a level in New Super Mario Bros?" and one guy answered that he said "That's a spicy meatball!" and we laughed our butts off. I'm still not 100% sure what he says but when I played it through this time I smiled and smiled remembering how adamant Nate was that he said "Breakfast tonight!" because let's face it, who _doesn't_ love breakfast for dinner? It's the best.

    How does the game hold up in 2026? It's pretty good still. I still love how quick and easy it is to pick it up. Its linearity is something I appreciate, but there's just enough secret stuff to make most of the levels worth replaying a time or two if you got really bored on a car trip or something. Each level has three "big coins" to collect that are semi hidden, so that's another obvious goal to go for. I'm not sure if there's anything to reward you for doing so. One feature I didn't explore at all is the multiplayer, but I can remember having fun with Nate playing those mini games. The wireless multiplayer of the DS was just the best, it still is amazing. 2006 was a time before WiFi was ubiquitous so wireless console-to-console communication really felt like a huge leap into the future compared to the GameBoy's link cable nightmare. As a Dad of more than a few kids now, I have to be ready to let kids have a turn on the game at any time and I like how I can just hand them the DS without much fear of them messing anything up.

    Mario has the regular mushroom and fire flower power ups, but they added giant and mini mushrooms here. Honestly, that is kind of actually annoying and underused. The mini mushroom is mostly just for random secrets, there are mini pipes only mini mario can go through so you have to get the mini mushroom and then make it through some large chunk of the level. The giant mushroom is pretty lame in my opinion. It lets you godzilla stomp pretty much everything in the level but it also makes you miss pretty much any of the special stuff. It's like if you suck at the game they just let you run through the entire level, except there are quite a few places you can't even fit through and if there are open pits you'll smash through the moving platforms and fall to your death. I avoided the giant mushroom. Oh, I almost forgot there's a shell powerup too but I honestly have no idea what that actually did. The fire flower was the best.

    I remember showing my older brother the game and he was incredibly underwhelmed because it was 2D. He's not totally wrong, the DS was launched with Super Mario 64 DS and Nintendo made a big deal about the 3D capabilities of the DS. But like, only having a d-pad and no analog stick makes for a pretty horrific 3D experience. Some games had you use the touch screen and stylus as a pseudo analog stick but then you had to awkwardly hold the console with one hand and my wrist just cannot take that kind of damage. So for me, I appreciate a nicely done "2.5D" game.

    They've gone on to make quite a few sequels for pretty much every console and portable Nintendo has released since the DS and honestly I don't think I have much interest in checking any of those out. I'm not sure if Super Mario Wonder is technically a "new" sequel or it's own thing but even then I'm just not super jazzed about it for some reason. I guess I came mostly for the nostalgia which maybe means this game is just okay. As a game in general, I guess I agree with that. But as a flagship game for Nintendo's sleek and modern new DS Lite in a time before smartphones to distract us with a firehose of toxic sludge, it's pretty great.
  date: 2/25/26
  wiki: https://en.wikipedia.org/wiki/New_Super_Mario_Bros.

- title: "Trauma Center: Under the Knife"
  platform: Nintendo DS
  developer: Atlus
  publisher: Atlus USA
  year: 2005
  image: https://upload.wikimedia.org/wikipedia/en/b/b5/Traumacenterbox.jpg
  text: |
    Finally, a game with a title that correctly describes the emotions you'll feel while playing it! This game is _traumatic_. One of the top comments on a YouTube playthrough was "I used to watch my cousin play this game and it gave me nightmares." It's incredibly hard. Essentially, it's just the old school board game _Operation_ but on a DS and with a Japanese visual novel strapped on. Honestly, the gameplay itself is pretty fun! You play as a trauma surgeon and you have to operate on patients, mostly fighting off a science fiction bioengineered super virus called G.U.I.L.T. It stands for something, I don't know what. You have about 10 or so tools at your disposal during surgery, things like a pump to suck out goop, magical healing gel, a syringe to inject medicines, a scalpel, and whatever the tool used to put in stitches is called. The game is entirely on the touch screen and I have to say, it's implemented very well. You have a nurse who "helps" you by giving you instructions on what you need to do and also very unhelpfully interrupting you with random shouts of "Doctor!" when you mess up. Most surgeries take only a few minutes max so you'll be working literally as fast as you possibly can. While you're operating, you monitor the patients vitals which start at 99 and when they get to 0, another doctor will kick you out and take over. In other words the patient dies but the game never actually kills them. In fact, the only time anyone dies in the game is when you are defusing a bomb and it explodes in your face, killing you. I found that kind of interesting. In between fighting strains of GUILT, you'll do random other things like the previously mentioned bomb defusal stage. I failed a lot.

    I think the main reason why this game is so traumatic is that it's short and incredibly intense bursts of action that need to be executed almost perfectly. The only other time I've felt this way playing a game was when I beat _Little Nemo_ on the NES. Again and again and again until you get it perfectly. You'll make it through the entire surgery and then at the very last part, the patient will go to 0 and it's all over. I think I had to attempt each surgery at least 5 times. In fact, a coping mechanism I developed was to just not even try or expect to beat the surgery on the first time. "It's just to learn what to do" I would tell myself. By my gosh, manipulating the stylus as fast as you possibly can while watching 5 things closely is just stressful! It's traumatic!

    Back during my initial run with the DS in 2005 I actually picked this game up new. I'm not sure how I knew about it. The thing is, the game is fun! It's a fun game that's also incredibly intense, stressful, and frustrating. During my play through there were several times I literally threw the stylus down in a fit or rage. When I owned it back in the day, I actually have a distinct memory of standing in my room, trying and failing again and again on a certain stage, and thinking to myself "If I don't stop playing this I'm going to break my DS" so I shut it off, walked away, and literally never picked it back up ever again. _Until now_. I made heavy use of a walkthrough (shoutout u/strawhat on GameFAQs) and the absolute king that recorded a longplay on YouTube. It's kind of funny to think about using a walkthrough for a board game like Operation, but it really was useful with specific strategies and techniques. "Ignore this", "Pay attention to that" kind of notes. Very helpful! I'm not going to lie to you, I seriously considered rage quitting this game again but I persevered and beat it! After the main story completion there are a few bonus stages that are even harder. I didn't even attempt them, I just watched someone on YouTube play them and that was good enough. And the reward for doing all that extra stuff? Literally a quote from the book of Revelations lol. Yeah, not worth it!

    I should note about the visual novel aspect of this game. Here's the thing, if you hit Select during the visual novel parts, it will just blaze through all the dialog. I made heavy use of it. I love the idea of the visual novel, but the actual story is just so ridiculous it wasn't that interesting. Think if there was some crazy Japanese version of a show like _E.R._, just not interesting. However, the music in this game is really quite excellent and I still got an ample dose even as the novel parts flew by. The whole atmosphere of the game is quite charming and interesting, just the story and dialog are dumb.

    So there you have it. I beat _Trauma Center_ 20 years later and didn't even break my DS. Oh, and I figured out why the game is so hard. Look at the main guy's hair on the box art. His hair is in face! Dude is doing open heart surgery and can't even see anything.
  date: 3/2/26
  wiki: https://en.wikipedia.org/wiki/Trauma_Center:_Under_the_Knife

- title: "The Legend of Zelda: Phantom Hourglass"
  platform: Nintendo DS
  developer: Nintendo EAD
  publisher: Nintendo
  year: 2007
  image: https://upload.wikimedia.org/wikipedia/en/5/5e/The_Legend_of_Zelda_Phantom_Hourglass_Game_Cover.jpg
  text: |
    I played _Phantom Hourglass_ for only a few minutes back in the day. For some reason I always kind of wrote it off as a stupid portable touch screen gimmick game. I remember a couple of  years ago I was chatting with a friend who mentioned _Phantom Hourglass_ was one of their favorite DS games and I silently judged them extremely hard for that. However, after being really charmed by the last couple of DS games I've played through, I decided I'd give it a second look. I'm sure glad I did!

    _Wind Waker_ was always my favorite _Zelda_ title (until I played through _Twilight Princess_ in 2024, that is). I just love the cel shaded graphics, having been charmed by that style by another one of my all time favorite Dreamcast games, _Jet Grind Radio_. I love how bright and colorful and expressive all the characters are. We actually preordered _Wind Waker_ back in 2003 and even got the very neat _Ocarina of Time/Master Quest_ promo disc. It's been a while since I played _Wind Waker_, but after finally playing _Twilight Princess HD_, I can understand why some were a little disappointed by it. Understanding that _Twilight Princess_ was released only a year before _Phantom Hourglass_, I can also understand why a lot of people wrote the DS offerings off as dumb novelties. However, I was really surprised just how much they packed into Phantom Hourglass.

    I suppose it's a bit disingenuous to say _Phantom Hourglass_ is _packed_ with content - it's not. It's actually fairly short. The final item, the hammer, is a lot of fun to use but it felt like I hardly got to use it at all. However, I was really impressed how well a fully 3D world worked on the DS. _Phantom Hourglass_ actually feels quite a bit more ambitious compared to a lot of even first-party games on the DS. The game is entirely controlled with the touch screen, something that remains quite controversial to this day. But I actually really enjoyed the freedom the touch screen gave me. Some of the buttons are used as more like hotkeys for certain touch screen items, which feels like a great way to allow a more experienced player to use more advanced techniques while not necessarily punishing people who only use the touch screen.

    I actually loved how well the _Wind Waker_ aesthetic translated to the DS. Rather than having to do an annoying spell to get your ship to go in the right direction, you just draw a path on a map and along the way you'll be ambushed by random enemies which would be annoying, but your ship has an awesome cannon that you can blast away with. Sometimes seagulls will follow you and you can even nail them which feels wrong but I like it. The top screen is mostly just used as a map, but you can draw on it to keep notes and there are some puzzles that require you to draw lines to find an intersection or something. However, during the boss fights, the top and bottom screen both show the fully 3D environment and I was really entertained to see how the developers made very clever use of the top screen to show what the large boss fights were doing up there. For example, one boss fight had you throwing bombs onto updrafts to send them to the top screen to attack the boss. Maybe I underestimate the power of the DS but _Phantom Hourglass_ really felt like they were pushing the console to it's full potential.

    A criticism I have is that there's kind of a core dungeon you have to return to several times. As you progress and get new items, certain shortcuts open up to allow you to skip some of the puzzles, but I just found myself mostly dreading having to deal with retreading the past sections. It's not a _huge_ problem since they allow you to skip about half of the dungeon using a warp, but I just felt like it was a bit clunky and would have preferred an all new dungeon instead of just a new section of the old one opening up.

    All in all, I really found myself enjoying _Phantom Hourglass_. I would recommend anyone give it a shot even if you are a hardcore Zelda fan or a newcomer. I think there's a lot to really enjoy about it if you're willing to look past some of the cultural milieu that surrounds the game. I'm looking forward to my playthrough of it's sequel, _Spirit Tracks_.
  date: 3/8/26
  wiki: https://en.wikipedia.org/wiki/The_Legend_of_Zelda:_Phantom_Hourglass

- title: "Trauma Center: Under the Knife 2"
  platform: Nintendo DS
  developer: Vanguard
  publisher: Atlus
  year: 2008
  image: https://upload.wikimedia.org/wikipedia/en/2/21/Trauma_Center_-_Under_the_Knife_2_Coverart.png
  text: |
    I suppose I have a bit of stockholm syndrome when it comes to _Trauma Center_. I think there's something cathartic about having to dedicate 110% of my attention to fine detail gameplay. Fortunately, I feel pretty strongly that _Under the Knife 2_ improves on it's predecessor in every way imaginable.

    First of all, the game is a heck of a lot easier. This is because, as you can tell from the box art, the character you play as Derek finally got a haircut so he can properly see while operating. Beyond that, they added 3 difficulty modes that can be chosen at any time - Easy, Normal, and Hard. I played the whole game on Normal with the exception of the final operation which I eventually had to bump down to easy mode on. I feel pretty confidently that with this new difficulty system, the first game would for sure be on hard. Normal felt _just right_ to me. A lot of the operations I was able to get through only having to retry a few times, some I didn't even have to retry on at all.

    I feel like they did a much better job giving this game more variety as well. The first game had a few introductory missions but once you got to the main "GUILT" viruses it was mostly just rinse and repeat with those a lot of times. This game changed it up, I didn't feel like I was just repeating the same operations over and over again with slight variations.

    Perhaps I was getting cocky, but towards the end I almost kind of missed the extreme difficulty of the first game. That is until I got to the final mission. I probably had to attempt it 30 times. I nearly got to the point I was at the first time I tried to play the first game where I thought to myself "I either need to put this game down or I'm going to break my DS". It's funny how about 12 hours and a decent night's sleep really helps when you're stuck on a problem. Picking it back up the next day, I was able to beat the final mission after only two attempts.

    As usual the music and overall aesthetics are quite the bop. They packed the cartridge with a lot more voice samples as well, some of which are pretty funny. My favorite is when Derek says "I'm a doctor!" as if that's news to anyone. I can't really say much about the story since I pressed select to blaze through all the dialog segments, but from what I could tell it was quite a bit more involved and less randomly insane than the first game.

    If you're wanting to play a _Trauma Center_ game for DS, I'd recommend both games. However I think you should probably start with the second game just to help get your bearings a bit more before throwing yourself at the extreme difficulty of the first game. Both are really quite great and I wish we'd have gotten a third! There's a few games on the Wii that I don't see myself getting into, I'm just not really a fan of the Wiimote.
  date: 3/12/26
  wiki: https://en.wikipedia.org/wiki/Trauma_Center:_Under_the_Knife_2

- title: Retro Game Challenge 2
  platform: Nintendo DS
  developer: indieszero
  publisher: Namco Bandai Games
  year: 2009
  image: https://upload.wikimedia.org/wikipedia/en/a/a4/Retro_Game_Challenge_2_cover_art.png
  text: |
    Near the end of 2025 I finally went back and beat [_Retro Game Challenge_](https://catskull.net/every-game-I-beat-in-2025.html#retro-game-challenge). I've had a real soft spot for that game since it's US release, and I eagerly awaited it's sequel to be localize but that never happened. Finally in 2014, an excellent fan translation launched. The defunct (?) blog _Tiny Cartridge_ even released some box art for it's Patreon backers which was the first time I ever became a Patreon for anything. Since then, my home made box has housed my r4 card when it's not in use. The second game is more of the same as the first, but it's probably just a little bit better in every way. There's a slew of new games, but this time it's not limited to a fictional Famicom system, but spread out among a few different consoles in addition to the Famiclone from the first game. There's a fun Pac-Man clone, a karate fighting game for some kind of PC Engine clone, a platformer similar to Gargoyle's Quest, a sort of silly visual novel (and a sequel/part 2 the main game doesn't even make you play) for the disk system add-on, a pretty cool top down shooter, a Tetris-like for the Game Boy clone, a nice RPG for the game's Game Boy Color clone (and sequel to the RPG from the first game), and a 16-bit sequel to the Gargoyle's Quest style game. I wish there were more 16-bit style games, but the variety in systems is a fun treat compared to the strictly 8-bit of the first game. It's impressive to me how fully fleshed out all the games feel. It doesn't feel like you're playing some half-baked minigame, it feels like you're playing some long lost games from the era. I can understand how this one didn't get an English localization. It's got an RPG and a visual novel. The visual novel especially is incredibly text heavy and that genre is still almost completely absent from the western market. I'll admit the visual novel for me was kind of a slog and not very fun, but I still enjoyed it for what it was. Two cool features of the sequel are that now some games have 2-player mode where you can play with or against your in-game friend. I wish they would have added proper multiplayer for these because some of them would be legitimately fun to go head to head on, especially if it didn't require an extra cartridge. Another great addition is that you can go visit "Funcoland", the in-game video game store, and test out some games there. For this they brought many of the games from the first game so you can still get a good taste for them. A lot of them are special editions such as a tournament edition that caps the time limit. I didn't spend a ton of time on them, but it really goes a long way to round out the whole package for me. I can't speak highly enough of the fan translation on this one. Again, they translated an entire two-part visual novel which is just incredible. As a post-game challenge, you're given the task of beating every game but I didn't take that challenge since it was post-credits. I think if you were on a long trip and got bored enough, I could see knocking them out one by one, but because they are like real/full games and not dumb minigames, it would take quite a bit of time. One unexpected feature of the unlocalized version is that they left the in-game friend's voice in Japanese. You see, your friend (who is the past child version of the Game Master who's making you play the games and dishing out the challenges) is watching you play. The bottom screen shows you and your friend looking at the TV, which is on the top screen and has the actual gameplay. As you play, your friend will say things as things happen in the game. If you beat a boss he'll should "Oh yeah!" or something like that. With Retro Game Challenge 1, the English voice over got kind of annoying at times. With the sequel, he only speaks Japanese so it's just a lot less annoying and more funny to me. I swear there are voice clips in this game that would be considered racist in any other context but in a game that is 100% Japanese, I feel better about laughing about them. In the sequel, apparently you can even unlock additional in-game voices. The only one I got sounds like a Japanese game show audience reaction, which is awesome. It's really too bad we didn't get this game in the West but I can completely understand why. It's a heavily Japanese focused game based on a very specific Japanese TV show which just sounds like a total legal and licensing nightmare. I wish they would have just made it a generic game to save themselves this headache. The developer went on to make the _NES Remix_ games but I've never really wanted to play them. I'm not that interested in doing random challenges for _actual_ NES games, it's the awesome would-be fictional games that are super interesting to me. If you haven't played either game, I think you're totally safe to give either the first or second a shot. I guess they came out with a remastered collection on the Switch that contains both games, but it's only been released in Japan and I doubt we'll see it here at any point. It's too bad because from what I can tell, they did a really excellent job porting the DS games to the Switch. I looked up importing a copy just to have in my collection but it's just a little too much for a game I wouldn't really be able to play. If I ever go back to Japan I'll add it on my list of things to look out for because it would be really cool to have it in my collection!
  date: 3/15/26
  wiki: https://en.wikipedia.org/wiki/Retro_Game_Challenge_2

- title: Contact
  platform: Nintendo DS
  developer: Grasshopper Manufacture
  publisher: Atlus USA
  year: 2006
  image: /public/media/posts/games/2026/contact.jpg
  text: |
    Another DS game in the books! This is another one off my "GameStop DS clearance search 2013" list. As I mentioned last year on [_Retro Game Challenge_](https://catskull.net/every-game-I-beat-in-2025.html#retro-game-challenge), there was a time when GameStop was aggressively trying to get rid of their entire DS library, right around the time that the 3DS was in it's height. One of the games that was around the $5 mark that I'd snag was _Contact_. I currently own two loose copies complete with my custom printed box art and one of those official blank DS game cases Nintendo used to sell.

    I'm not totally sure how I knew about _Contact_. I have vague memory of knowing about it back during the time it was first released. It seems like it made kind of a splash in the US since it came out about the same time as _Mother 3_ but it was fairly clear we weren't going to be seeing _Mother 3_ here. Contact is often compared to _Earthbound_, and I think it's pretty clear it's at least partly inspired by it.

    In _Contact_ you play as yourself. You, the player, are interacting with the characters and events in the game. Like _Earthbound_, _Contact_ asks your name, your favorite food, etc. The basic synopsis is that there's a Professor flying around in his space ship with his dog, Mochi, who wants to be a cat and acts like a cat. The only reason I know that it's a dog and not a cat is that I read the manual and it specifically tells you that its a dog. I'm really struggling to write about this game because there's just a lot of interesting stuff that's hard to describe. You, the player, control Terry. I don't want to spoil the story, but I think the best way to describe the exact setup is that the Professor enlists your help to fix his space ship by taking control of Terry. You control Terry, but you are _not_ Terry. At the end of the game, Terry actually confronts you as the player for controlling him. From the Professor and your viewpoint, the antagonists are a band of space terrorists called the "CosmoNOTs" (Cosmic Nihilist Organization for Terror). What exactly their beef with the Professor is, it's not entirely clear. All I know is that one day Terry is chilling on a park bench when suddenly the Professor shows up in his spaceship and I think essentially abducts Terry and enslaves him with a wristband that allows you, the player, to control him.

    If you look at screenshots of the game, you'll notice that the Professor and his spaceship are drawn in a more 8-bit style of artwork, while Terry and everything else in the game is in a more detailed 32-bit style. This to me says that the Professor is really foreign in the game's world, which makes me less sympathetic to his plight. The CosmoNOTs look like Terry and seemingly belong in the world, while the Professor is something else. After the Professor abducts Terry, he next wakes up washed up on a beach. That feels like not a great indication that the Professor wants to help Terry and kind of confirms he's just using you and Terry. The game world is organized as a globe/planet with distinct islands you navigate to as the Professor tracks down cells to fix his spaceship. Even though the Professor has a ship capable of space flight, he says that he found a sunken pirate ship and somehow attaches his space ship to it. As Terry, you have a bedroom on the ship where you sleep to save the game, a bathtub where you soak to restore health, a closet where you change clothes to activate different abilities, and a kitchen where you cook food (as long as you're wearing the chef clothes). Then randomly you can walk into on room on the ship that's the Professor's ship. Am I making any sense at all? 32-bit Terry will walk into the Professor's 8-bit ship. They can fully interact. The professor never leaves his ship room, but if you die you'll be resurrected in your bed on board and Mochi (who is also 8-bit) will be resting on top of you while you sleep. So it seems like the 8-bit and 32-bit worlds are fully linked. You'd sort of think Terry would reduce to 8-bit when he enters the Professor's world, but he doesn't.

    I think that is essentially what _Contact_ is about, at it's core. It's about making contact between different worlds. The Professor making contact with you, the player. You, the player, making contact with Terry. The Professor making contact with Terry. Three worlds collide. I should also note that with the exception of Terry's confrontation at the end of the game, nothing in Terry's 32-bit world ever directly makes contact with you, the player. There is contact between the Professor and other things in Terry's world, such as a part where Mochi heroically saves Terry. After you have Terry sleep to save the game, while he is still sleeping, you interact with the Professor and Mochi. It kind of becomes like a Tamagochi. You can have Mochi play with the computer, sleep on the bed, or scratch the scratch thing But if you're really a pro you'll know you have to do a special flick motion to pet him and then he'll lay down and you can tap the crap out of him to make him super happy. It's just interesting to me that you, the player, can interact with the Professor's world directly, but the Professor is deliberate about making sure that only happens when Terry isn't around.

    The gameplay itself is a real time turn based RPG. The combat system reminds me the most of _Star Wars: Knights of the Old Republic_ which is essentially an "MMO" style of combat. Terry will attack at a regular interval, the enemy will attack back at a regular interval. You can use special abilities but most of the time you're just kind of sitting there while it happens. One of the quirks of the game is that you have "decals" that you apply to Terry's world. There's a Mochi decal which will summon him and depending on how much you've been playing with him, he'll do damage to enemies. There's also stat decals you can apply to Terry in the menu that will buff certain traits. I guess I should mention that the game's mechanics are pretty complex. There are like 30 individual stats that all do random things such as "Fame" and "Strength". Your progression happens real time and it's just based on how much you do that thing. For my playthrough there was a decent amount of grind. Just camping out by a bathtub and killing a room of enemies, then healing and doing it again. I'm not sure if I had to do it, but the game can be pretty punishing especially considering that the combat is mostly just random. If you get unlucky it's pretty easy to take a ton of damage quickly and end up dead. If you happen to fight two or more enemies at once, they'll interrupt your attack cycle so you'll just get pounded without doing any damage at all. That's when things can get really tricky so it's best to just run away and try again.

    One of the criticisms this game gets is the "digestion system". Yes you read that right. Terry can eat food that heals him or does other stat buffs/debuffs. Each food item has it's own "digestion period" that fills up his stomach. If his stomach is full, he can't eat anything until he's digested some. Each food digests at different rates and the digestion period is also the timer for how long the buff will last. It gets kind of complex. As mentioned before, Terry can also cook food but honestly unless you just really love that sort of thing, it's probably not worth your time. This is because you can simply buy potions which act as a food item but take up next to no digestion space and digest super fast. It's a lot simpler than trying to deal with a bunch of food, especially if you're in a boss fight. I think the whole cooking and food mechanic is interesting, but the implementation kind of limits it's potential. I'm glad it's there as an option, but I just bought potions. There are three weapon types - fist, sword, and hammer. There are about 100 unique weapons in the game and they all will fall into one of these three categories. Each weapon subtype is also a skill you can level up. For my playthrough I ended up using hammers about 90% of the time, which ends up having a snowball effect because then your other weapons will be super under leveled and can't really be used later on unless you grind that weapon for a while. At one point I wanted to use a fist weapon but I was super under leveled and had to grind it for a while before it was really very useful.

    I found the graphics and music to be overall really awesome. There is some truly beautiful artwork and some really well done music. There are also some really annoying sound effects. For example, sometimes the Professor will call Terry and while this is happening there is a super loud telegraph style beeping sound. It wouldn't be that bad but it truly is super duper loud. Also there are some small voice clips that are charming but overdone. For example there's a "hiccup" voice clip that's not offensive on it's own, but you'll hear it like 30 times in the span of a minute and it just gets old. The music really pops off at times. The issue is that the battle music will interrupt and restart the music so you never really get to hear it for longer than a few seconds at a time unless you stop to listen to it. Maybe that's okay. I just think they could have let the main music play out a bit more.

    In case you can't tell, this game really gripped me. Is it the greatest game of all time? Not at all. There are a lot of things that are just unintuitive and kind of smell of plain bad game design. It's also fairly short - my playthrough lasted just over 12 hours and that's even with at least 2 hours total of grinding. The pacing is also not very consistent. Some of the islands drag on forever, while others are over before you even get a good feel for them. There are 5 main islands you progress through. The third island is an Egypt style place where you wander around in pyramids for what feels like forever with tons of hidden passages and things to explore. The fourth is just a giant shopping center called "Habara" and is very clearly supposed to be one of those giant _Don Quixote_ style stores you'll find in Akihabara, Tokyo. You'll just breeze right through it despite it having some of the best music and most unique settings in the game!

    For some reason, I had the impression that this game was unfinished and had to be rushed out for release. I swear I read articles that talked about that, but as I played through this time I found less evidence of that. However, it does feel pretty unfinished. In fact, in a post-game cutscene, the Professor mentions that the game had to be rushed out before it was finished. It's not clear to me if this is supposed to be taken literally or not. I also had the impression that I've beaten this game before, back when I first cleaned out a GameStop for their copies, but there is a _lot_ of content I just don't really remember.

    Having now beaten every entry in the _Mother_ series as well as _Contact_, I am a bigger fan of this game than I think I would otherwise expect myself to be. The whole premise is just really unique and interesting to me. It leaves me wanting more. I'm scouring the net for more info. I've read interviews with the localization team, I found scans of the manual and read the whole thing, I'm looking at 20 year old GamFAQs discussion threads about the game. I've watched every YouTube review I could find. I don't think anything I've seen or read really quite nails what _Contact_ is. I felt all of them missed pretty big aspects of the game, and criticisms felt more like misunderstandings of the game. Yes, it's flawed, often in big ways. But man, there just isn't anything else quite like _Contact_. I've never played any of _Grasshoper Manufacture_'s games and honestly I doubt I will. Supposedly a sequel was planned at some point but it's been 20 years since we've heard anything about that so I'm not holding my breath. However, I know for a fact that this game is underrated. It's one of the best games on the DS and possibly one of the best RPGs of all time. There's so much untapped potential. I feel that it could be ported to the Switch or another console very easily and that a lot of the rough edges could be evened out. They could expand on the story and make it a true masterpiece, there's already so much here that's excellent.

    After Terry is abducted/joins the Professor, his Mom calls his cell phone to tell him to come home for dinner. "We're sorry, the number you have dialed is in space", his answering machine responds. After the game is over and the Professor has left Terry on the starting island alone and abandoned, Mint, the games main antagonist, final boss, and leader of the CosmoNOTs hears Terry's distress call and comes to rescue him. During the course of the game, she's developed feelings for Terry. She picks him up in her flying car and takes him back home, something the Professor promised Terry he'd do after helping him. Before leaving, she shyly asks if next time they meet, they can work together. "Next time we meet... will you help me?" The final scene of the game shows Terry walking into his house where his Mother is waiting for him to come home for dinner.
  date: 3/20/26
  wiki: https://en.wikipedia.org/wiki/Contact_(video_game)

- title: ActRaiser
  platform: SNES
  developer: Quintet
  publisher: Enix
  year: 1991
  image: /public/media/posts/games/2026/actraiser.jpg
  text: |
    _ActRaiser_ is a hybrid platforming/city sim "RPG". I put that in loose terms because there are certainly RPG elements, but it's far from the usual fare. It was released incredibly early in the SNES' lifespan and might actually be an early masterpiece. If you told me it was released in 1997 I'd probably believe it without blinking. But the fact that it came out in 1990 (in Japan) and that it's unique hybrid gameplay still hasn't been done again (not even by it's own sequel) is really quite astounding.

    I honestly can't remember when or how I learned about _ActRaiser_. I seem to have an extremely vague recollection of maybe playing it a friend's house as a kid. It might have been found during our initial push into SNES emulation in the early 2000's. I was charmed by the straightforward platforming levels, and I found the city sim parts very fun and natural. This is coming from someone who has never been able to mentally grasp _SimCity_, or really any other sim other than maybe _Rollercoaster Tycoon_.

    For some reason, the platforming levels reminded me of _Super Star Wars_ if that game was actually fun. For one, the soundtrack is absolutely _banging_. No surprise once I saw the credits - the one and only Yuzo Koshiro blessed us with a great OST. Between him and Yoko Shimomura, the SNES has some really amazing soundtracks. The graphics are all well done but also kind of crappy in a charming way. I found myself smiling and laughing at all the random devils and dwarves. Your warrior dude makes the most epic "hah" sound when you swing your sword. Honestly the whole soundtrack is loaded with samples that sound way, way ahead of their time.

    I should back up a bit. You play God. I'm not going to go into the backstory but basically you live in a flying palace (in heaven I guess?) and you cruise around to 6 different towns and the people pray to you. Each town starts with a platforming level, and is followed by a city building section, and then another platforming level and boss fight. I guess you, as God, possess a statue of a warrior and that's how you do the platforming levels. For the city building parts, you control a little cherub dude with a cute bum flying around. There are certain spots on the ground where monsters spawn and they'll go mess with the town and burn down homes and stuff, so you have a bow you shoot them with to keep the peace while the townspeople build. You have a few miracles you can perform such as lightning strike that are almost exclusively used to clear land for the people to build on. From time to time, they'll give you an offering of some random crap they found that are little power ups and such. Sometimes there's a "crisis" where you have to deal with something like a dude lighting his house on fire. If you've ever played _Black & White_, it's kind of like that. Each town has one crisis I think.

    Some of the offerings can be taken to other towns to solve problems there. For example one town has "herbs" that you have to take to another town to cure the plague. You guide the town on where to build, and when the town gets near one of the monster portals, they'll come out and do this crazy ritual to seal the monster portal up and stop monsters from spawning. Once all the monster portals are sealed, the townspeople will pray again, freaking out about some random evil thing that is happening. When that happens, you return to sky palace and enter the second platforming stage and beat the boss. After that, the town is pretty much just peaceful but there are usually a few extra things to do.

    Your God character gains levels as the total population of the towns increases. It's mostly natural and straightforward, but there are some hidden mechanics you sort of get a feel for. For example, the towns will "level up" and start building more "efficient" buildings that just increase the population. However, they don't tear down their older, less efficient buildings, so it's up to you to wreak havoc with earthquakes and lightning strikes to make them rebuild better buildings. You'd think the townspeople would get mad about you wrecking their stuff, but they do not care at all. There's some complex formula that takes your score during the platforming stages and how many of the monsters you kill during the city building that will determine how many people will end up living in the town. I think the maximum achievable level is 17, but I only got to 16.

    It's really not a long game, each town only takes about 45 minutes to an hour, you can easily beat the whole game in well under 8 hours. I started playing on a whim and really had a hard time putting it down. The core loop of platformer, city building, platformer, next town really got a grip on me. I was really caught up in the short yet rewarding levels. Not to mention the already mentioned banging soundtrack and hilarious graphics. One of the monsters that spawn in the overworld is a little devil dude who also has a little bum hanging out!

    I guess the original Japanese release was way harder than the American release. It's really not hard. I used save states but you have plenty of extra lives and the game doesn't really punish you for dying. For example if you make it through the platforming level and die during the boss fight, it will respawn you at the boss fight. I never actually got a game over.

    I think _ActRaiser_ is a really excellent game and it's crazy impressive to me how much they did just months after the console's release. The folks at Quintet really knew their stuff. There is a sequel, also for the SNES but it dumped the citybuilding parts. I remember trying it out and being super disappointed, and right now the premise of a pure platformer isn't something I'm feeling interested in. Like, I want to be _God_, not just some warrior dude in a generic platformer, you know?
  date: 4/1/26
  wiki: https://en.wikipedia.org/wiki/ActRaiser

- title: Sky Force Reloaded
  platform: Nintendo Switch
  developer: Infinite Dreams Inc.
  publisher: Infinite Dreams Inc.
  year: 2018
  image: /public/media/posts/games/2026/skyforce.avif
  text: |
    _Sky Force_ is a series of vertical shooters from Polish developer "Infinite Dreams". There are two main games in the series - 2014/Anniversary, and Reloaded. I first played a _Sky Force_ game back in 2015 on my Android phone. I was interning for a summer and it was fun and addicting enough I'd actually make excuses to lock myself in a bathroom stall and play a round or two. I eventually dropped off though.

    Both games are "free to play" on mobile, but the console and PC ports apparently have worked out all the F2P gimmicks and microtransactions, but honestly the implementation there isn't _too_ offensive. You can play for free, but there are a few paid unlockables that are a one time purchase that end up equalling out to be pretty close to the $10 price tag the console ports go for. That said, I'd highly recommend the console versions over the mobile game as they'll just be a lot easier to play. This game is not easy!

    There are 13 main story levels to play through. Each level has four trophies to unlock: kill 70% of enemies, kill 100% enemies, rescue all people, and beat the stage undamaged. It's that last one that gets me. The stakes are _so high_. Once you get all four trophies, you unlock another difficulty level for the stage that has another set of the same four trophies. There are 3 difficulty levels, with a 4th "insane" difficulty level unlocked after beating the 13th level, which is effectively what "beating the game" means since credits scroll after that point. Then there are 3 more "post-game" bonus levels, along with the 4th difficulty previously mentioned.

    What makes the game so compelling is that it's effectively a rouge-like. As you defeat enemies you collect the in-game currency, stars. With stars, you upgrade your ship. So even if you die on a level, you still get your stars and can slowly upgrade your ship to be more powerful and take more damage, which makes the levels get easier. It's that iterative loop, trying again and again (and again) to get all four trophies, and then on to the next difficulty level to do it all over again. Further difficulty levels reward you with more stars per level.

    In addition to collecting stars to upgrade your ship, there are randomly placed "cards" and "ship parts". Cards are either temporal or permanant. For example one card will boost your firing rate for 15 minutes, while another will permanantly give you a side cannon. The permanant cards are very rewarding when you get them, but you have to farm quite a bit to get them to show up at all. If you collect a card but die on the level? It's gone. So card collecting becomes pretty much unviable until you can reliably clear the level. Ship parts are extremely scarce but once you get 5 of the same ship's part, you unlock a new ship which will have certain buffs and debuffs such as more health but slower movement orr increased firing damage.

    The game has a great couch co-op mode where a second player can join the game. It's a great one to play with a kid or less skilled players since there's no downside whatsoever to having a second player. As someone who usually has at least one kid around wanting to participate, I really appreciate a good co-op game.

    While the rougelike elements are fun and rewarding, towards the end it became a bit of a slog. Progress felt slow. I ended up blindly grinding the same stage until I'd maxed out my upgrades before I was able to beat the final level. I feel the game could be balanced out a bit more but as is, it's overall pretty great. My playthrough apparently took about 20 hours which feels short compared to how much time I felt like I was putting into it. I would say I'm about 70% through the content of the game. There's quite a bit of post game challenge to still dig through. My appetite for that is pretty minimal right now, but I am about half way through the other game in the series, _Sky Force Anniversary_.
  date: 5/7/26
  wiki: https://en.wikipedia.org/wiki/Sky_Force

- title: Tom Clancy's Splinter Cell
  platform: Nintendo GameCube (dolphin)
  developer: Ubisoft Montreal
  publisher: Ubisoft
  year: 2003
  image: /public/media/posts/games/2026/sc.jpg
  text: |
    Those early days of the sixth generation of console gaming felt really magical. The days of the pixel art sidescrolling platformer were ancient history. Developers had mostly figured out how to deal with the issues that 3D camera systems introduced in the fifth generation. All of the major consoles had settled on a dual analog stick setup that allowed first person shooters to thrive. Sega had just departed from the home console market, leaving a void mostly filled by the introduction of Microsoft's Xbox. Nintendo was still fighting hard to catch up on the ground they lost to Sony after the PlayStation mostly beat the snot out of the Nintendo 64. The vision for online console gaming had _finally_ been proven by Sega's Dreamcast. In the end, Sony's PlayStation 2 outsold both GameCube and Xbox nearly 4-to-1, but that story hadn't been written yet. It actually felt like almost anything was possible.

    We had always been a Nintendo household. We had a Super Nintendo, Game Boys, and then a Nintendo 64. For Christmas 2002 my brother and I pooled our gift allowance to get a black GameCube which I still own to this day. It had some strong exclusives like _Super Smash Bros._, _Mario Party_, _Starfox Adventures_, and _Mario Kart Double Dash_. Since they had so much ground to make up after their failure with the 64, Nintendo used some nice and generous marketing tactics to desperately try and claw back some sales such as including a free copy of _Ocarina of Time_ with any _Windwaker_ preorder. Compared to allowing you the opportunity to buy a 20 year old game for $30, or expecting you to pay $10 for a tutorial, this was a very different era for Nintendo. Evidently, one of the tactics they employed was including a demo disk with some console sales. I know for a fact that our console did not come with a demo disk, but evidently someone we knew had one and among other things, it included a demo of _Tom Clancy's Splinter Cell_. I had no clue who Tom Clancy was but that demo was incredibly fun.

    Apparently _Splinter Cell_ initially launched as a platform exclusive on the Xbox in 2002 and was later ported in 2003 to every other platform including the GameCube. Even now, the concept of Nintendo footing the bill to provide demo discs showing off third party games that weren't even exclusives tells me just how desperate they were to show their long term commitment to the platform in the wake of Sega dramatically pulling the plug on the Dreamcast, leaving any developer who invested in it caught with a hot potato. I guess Nintendo's strategy ultimately didn't pay off because we never bought any of the games demoed, including _Splinter Cell_.

    Later, in the summer of 2003, my brother got a summer job pushing carts for the local grocery store and bought himself an Xbox. I remember going to Best Buy with him and getting talked into buying an extended warranty on it. Shame on Best Buy! For whatever reason, Xbox games did not hold their value in the way that GameCube games did. I'm not even sure how or when, but at some point we ended up with a used copy of _Splinter Cell_ for the Xbox - likely purchased for only a few dollars from GameStop. This was probably closer to 2005 or 2006 when the 360 was the hotness and everyone was unloading their OG Xbox gear _en masse_ to pay for the privilege. What a different time it was! The OG Xbox was released in 2001, the 360 was released in 2005 just _four years later_. Today, Nintendo has been happily shipping the Switch for the better part of the last decade with no clear expectation of stopping any time soon even after the Switch 2 was released. I'm sidetracked here but it seems like the Switch 2 is doing _okay_, but not great. I wonder if the cycle will continue with Nintendo absolutely dominating for a generation and then stumbling _hard_.

    Since I'm already so far off the rails here, I'd love to reminisce for a moment about using the Xbox _Splinter Cell_ as the entry point for softmodding. It was probably the summer of '06 when I got into Xbox modding and tinkering. Likely my first soldering project I ever attempted was making a custom Xbox to female USB 2.0 cable. Long story short, the controller ports on the Xbox were just USB with a proprietary socket, and the memory card ports on the controllers were also just USB. If you plugged a regular USB flash drive into an Xbox it would happily format and use it as a memory card! Paired with some third party Action Replay PC software, it became possible to back up and load game saves on a computer. It also turned out that the game save for _Splinter Cell_ contained a configuration file to store user preferences and was susceptible to the classic buffer overflow attack. Thus, crafty users were able to cook up a corrupted save file that would allow arbitrary code execution. This was combined with a feature that allowed the Xbox console to update its BIOS from software, and it was only natural this code execution would be daisy chained into a payload that patched the BIOS to fully open the console to execute any code at all, with or without Microsoft's approval. Burning DVDs is easy enough, but also fairly cumbersome. The Dreamcast had no copy protection whatsoever so while it was possible to burn your own games, it was also fairly uncommon and I don't think it played into the console's failure as much as we sometimes give it credit for. However, the Xbox had a killer feature! Microsoft included a 20 gigabyte hard disk drive! I have no clue what they were thinking there. Yes, it eliminated the need for external memory cards like the GameCube and PlayStation 2 needed. But it was never really used very well for any features. You could technically rip audio CDs to the internal storage and certain games allowed you to use the ripped audio as the in game soundtrack but that was incredibly niche. However, if you wanted to flash a custom BIOS, then ripping a game to the internal hard drive felt like a no brainer! Have your library on the console! Not even from a piracy perspective, it was just more convenient to rip your game library. The optical drive was slower than the internal hard drive so doing this literally decreased loading times and made the experience better. On top of that, the optical drives were prone to failure. Discs were prone to scratches that rendered them useless. From there, a virtual homebrew gold rush caused the "xbox scene" to _explode_ in popularity. You could spend about $10 and play any emulator, home brew game, or Xbox game backup on the console you already owned and used. Because Microsoft used standard IDE hard disks, a very popular mod was to replace the 20 GB drive with a much larger drive. Something like 200 GB was only $50-$100 and would allow you to store the majority of the Xbox game library as well as the majority of any video game ever released. It was a wild, wild time. Even if you weren't prone to "hacking", the optical and hard disk drives were prone to failure so in a lot of cases, doing these mods were the only viable option to keep your console operational. To this day, if you find an Xbox in the wild, it's rare to find one that hasn't been opened or softmodded. It just became part of every day life, it's hard to state in words just how ubiquitous this became. "Oh an Xbox, have you modded it?"

    For these reasons, without even talking about any of the actual gameplay, it's easy to say that the original _Splinter Cell_ is one of the most legendary games of all time. That legacy doesn't do the game justice though. It's not some cheap shovelware game nobody cares about - it's actually incredibly fun!

    At its core, this is a 3D stealth third-person shooter. You play as Sam Fisher, some kind of ultra secret agent. It's like _James Bond_ meets the _Navy SEALs_. I'm not totally sure but I think the gist is that you're operating in some kind of extra-legal covert operation. The only other game I've played I think is similar at all would be Eidos Interactive's groundbreaking 1998 _Thief: The Dark Project_. _Splinter Cell_ makes heavy use of environmental conditions most notably light and sound. A light meter on the HUD shows how visible you are, if you are completely in the dark you'll be mostly invisible. Walking fast makes more sound, as does walking over broken glass or on a metal surface. Stealth is the name of the game. While there are parts of the game where running in guns blazing is used, most of the time you're much better off going quietly and slowly. Sneaking up and quietly subduing an enemy guard is the way to go! Leaving a trail of bodies is a bad idea though. You need to hide the bodies in the darkness or else they will be found and raise suspicion. The level design is generally very linear. While there are options as far as how you go about dealing with guards to progress, there are less options than you might think. Usually you'll find a preferred strategy and stick with it. Sometimes the solution is hard to find and you'll end up doing the same section numerous times until you figure out how to deal with the situation. Perhaps obtuse at times, I personally enjoyed the iterative problem solving gameplay. For this reason I think _Splinter Cell_ is more of a platformer at its core than a shooter.

    The environmental design of the game is second to none. Whether it's prowling the streets of Azerbaijan in the wee hours of the morning, infiltrating the CIA headquarters, or sabotaging an oil rig in the Caspian Sea, the levels are staged and lit to such detail that it feels straight out of the best spy thriller from James Bond to the Bourne series. The music is also top notch with some great early 2000's trance tracks. The majority of the game is slow and quiet, but at times it really amps up the sound to get your heart pounding. Because light is such a huge aspect of the gameplay, the lighting in each level is absolutely incredible. Strong, sharp shadows. Window blind shadows bouncing gracefully off your stealth uniform as you sneak past a guard. The whole presentation is incredible and ground breaking.

    On top of all this, _Splinter Cell_ has likely the _very best_ UI design of all time, by far. They officially licensed the Palm brand and design. The menu, the HUD, everything is designed as if you're looking at a Palm Pilot! A crispy pea green LCD with a beautiful skeuomorphic Palm Pilot border. As a capsule straight out of 2003, this UI feels like a timeless capsule straight back to the technology of that day. I honestly think the freaking _menu_ is one of my favorite parts of this entire game!

    Ubisoft followed up with two sequels in 2004's _Pandora Tomorrow_ and 2005's _Chaos Theory_. I recall the Official Xbox Magazine making a big deal about _Chaos Theory_ receiving a 9.9 out of 10 in their review, the highest rated game they had reviewed up to that point. Generally speaking, I think this first game is considered the _worst_ of the original core three games. After the first three, I think the series had kind of overstayed its welcome and went downhill for a bit, but I haven't played the newer games myself and can't speak to their quality. I think the gaming scene had moved on from that bygone era of the 6th generation and more interesting open world games like the _Elder Scrolls_ and _Fallout_ series took over the mainstream.

    Apparently the Xbox version is the "pure" experience, with the GameCube and PS2 ports having been changed to make levels easier. I also think those consoles are likely less capable graphically, so I'd recommend playing the original Xbox release if possible. I didn't know that and I wanted to emulate it on my computer so I went with Dolphin since it's very mature on Mac. I actually keep an original Xbox around complete with a nice HDMI mod so it looks very nice even on my modern TV. If I would have known about this, I would have played on my Xbox. That said, I still had a blast with the GameCube release. It's just a total blast with simple, straightforward, yet addicting gameplay. I've learned that I prefer games that are either 100% open world or 100% linear and this checks the linear box in a perfect way for me. I can't wait to dive into the sequels next!
  date: 5/23/26
  wiki: https://en.wikipedia.org/wiki/Tom_Clancy%27s_Splinter_Cell_(video_game)

- title: "Tom Clancy's Splinter Cell: Pandora Tomorrow"
  platform: Xbox
  developer: Ubisoft Milan/Shanghai
  publisher: Ubisoft
  year: 2004
  image: /public/media/posts/games/2026/scpt.jpg
  text: |
    _Image courtesy of The Cover Project_

    After I had such a blast with the first _Splinter Cell_ game, I couldn't wait to dive into the sequel, _Pandora Tomorrow_. Since I learned that the "definitive" versions of the games were on the original Xbox, I decided to boot up my trusty OG Xbox and play on real hardware. Back during the pandemic, I got the itch to get myself an Xbox and get it totally ready to rock. A super common issue with them is that there's a specific super capacitor that's used as an alternative to a BIOS battery. I guess that was a good choice at the time, but the problem is this one capacitor is notorious for failing and leaking acid all over the PCB. Specifically, the traces for the front buttons (power, eject) run right through the section where this capacitor is and they're right near the edge of the board so they'll corrode and fail which leaves the Xbox mostly broken. Fortunately, I was pretty good with a soldering iron at the time and was able to do a repair to get it totally functional. While the clock capacitor can be replaced, removing it doesn't really do any harm other than keeping the clock not synced, which impacts nothing. I actually took the time to do a full capacitor replacement on the whole console at that time. Additionally, I installed a sweet little Xbox HDMI converter, put in a modchip (Aladdin XT), and upgraded the HDD. It rocks pretty hard now! My oldest and I had a blast playing through _Burnout 3: Takedown_ and the HDMI output looks really great. I've also refurbished a set of controllers with fresh thumbsticks and controller cables. Put simply - I've got a really great OG Xbox set up ready to rock. So I figured I might as well put it to use and play this game on it.

    _Pandora Tomorrow_ was a quick sequel. While the first was developed by Ubisoft Montreal, this one was farmed out to Ubisoft Milan and Shanghai. You could almost think of this as more of an "expansion pack" since the core gameplay and engine remain about 95% unchanged. Just more levels. The mechanics they did add are mostly useless such as the ability to hang upside down and shoot your gun, which I don't think I used a single time. One cool new ability is the "SWAT turn" which allows you to flip past an open door when your back is to the wall, allowing you to remain in stealth even while crossing an opening. Beyond that, its the same old _Splinter Cell_ just with a new campaign and levels. For me, I'm a huge fan of the original so I loved it. It sounds like most people do not share my sentiment on that front, prefering later titles in the series over the first two.

    Each level progresses through a series of checkpoints that save the game. I really enjoyed that iterative approach. The checkpoint doesn't restore your health, ammo, or alarm status, but it does allow you to quickly jump back as you figure out how exactly to deal with each section of the level. Most sections required at least a few attempts, some took me dozens. Every checkpoint was a huge sigh of relief. While the levels are almost completely linear, there are always at least a few ways to deal with each situation as various scripted events from NPCs play out. It's like an iterative puzzle you solve one step at a time. For the most part it was enjoyable, though some sections felt overly long and I'd have to wait through the same challenge again and again as I figured out the next part of the section.

    There are some really incredible levels in this game! I'd say that makes it stand even above the first game. A lot of them take place in Indonesia with various tropical and beach themed levels. A highlight for me was the Jerusalem level which is accompanied with a great thematic soundtrack. Another cool location was on a submarine. I really enjoyed that a lot of the levels had multiple paths that were all potentially valid, depending on how I liked to play them. The first game usually just had a single valid approach, which was still fine, but being able to choose which guards I ignored, how I took them down, and where I went made repeating sections and experimenting more fulfilling.

    Unfortunately for me the game ends on a low note. The last level actually takes place inside Los Angeles International Airport (LAX) and it was pretty frustrating. There are a ton of guards who you can't kill and a few that you have to kill. But if any of them notice you at all, it's game over. It took a really long time and overstayed it's welcome for me. The final action sequence of the game in particular felt poorly executed. After being so stealthy and tactical for the entire game, you mostly just have to run in guns blazing and machine gun down the final three enemies. I tried several times and was unable to even figure out a stealthy path.

    Since I raved so much about the licensed "Palm OS" menu theme of the first game, I was intrigued that they licensed the Sony Ericsson with a still cool mobile PDA style menu theme, but it isn't nearly as iconic as the original Palm PDA of the first game. Still good, just not incredible.

    I admit that I immediately dove into the next sequel _Chaos Theory_ which is supposed to be the best, but my initial impressions are not great. The engine is changed quite a bit so it plays a lot different from the first two games. On top of that, the menu is just a regular menu nothing cool or branded at all. A lot of the charm is just missing for me. I might still give it a few more tries but so far, I wouldn't be surprised if it doesn't end up on this list.
  date: 5/28/26
  wiki: https://en.wikipedia.org/wiki/Tom_Clancy%27s_Splinter_Cell:_Pandora_Tomorrow

- title: Shining Force CD
  platform: Sega CD
  developer: Sonic! Software Planning
  publisher: Sega
  year: 1995
  image: /public/media/posts/games/2026/sfcd.jpg
  text: |
    Last year, I played through the original [_Shining Force_](/every-game-I-beat-in-2025.html#shining-force) and [one of the Game Gear sequels](/every-game-I-beat-in-2025.html#shining-force-gaiden-final-conflict) and generally speaking, I loved them. Like I've mentioned elsewhere, I've found that I enjoy games that are either 100% linear or 100% open world. If there's something I'm supposed to be doing that the game doesn't essentially force me to do, I get lost and confused. The first Shining Force has open world parts, but there's not a lot to do or miss. The Game Gear games actually remove the open world parts completely which I actually enjoy. It's just battle after battle with forced intermissions to buy new weapons and manage your party. Almost think of it in the way that _Advance Wars_ is. One of the things I like the most about Shining Force is the ability to change out party members as you gain new ones or get sick of old ones. For that reason, I've described it as "Pokèmon meets chess" which makes a lot of sense in my head.

    _Shining Force CD_ is actually the first two Game Gear Shining Force games remade in the _Shining Force II_ engine with the nice redbook audio tracks CD based games were known for. At first I missed the more basic chiptune tracks of the pure Genesis games, but the composed soundtrack grew on me over time. I almost counted this one as two games, since it really is two full Game Gear games in one package, but I held off. I would say for me, the second "Book" (game) was a little bit better than the first. There's a cool part where your party actually splits up and you control both halves until they're reunited.

    One of the interesting mechanical staples of the series is the ability for party members to gain experience points, level up, and eventually be promoted when they reach level 10. However, you don't have to promote right at level 10, they can go all the way to level 20 before promotion. Promoting resets their level to 10 no matter when you promote, and there's a slight stat loss if you promote as soon as you can. As far as I can tell, promoting right away at level 10 is fine for a normal playthrough. However, I enjoy the games and I enjoy grinding a bit (thanks to fast forward on my emulator), so I typically grinded my party to the high teens before promotion. Again, you can kind of think of it as similar to evolving in Pokèmon where you can stop the automatic evolution and continue grinding in their more basic form to become more powerful than if you had evolved right away.

    To be honest, the story to me is mostly just blah blah blah. Something dark power, resurrecting ancient evil, whatever. It's just the gameplay that is so simple and addicting to me! As usual, I made use of a single save state to minimize bad random numbers and mistakes. It just takes some of the stress off for me and allows me to enjoy the game more. Fast forward is also very nice to cut down the time you have to waste while watching enemy units move.

    After you beat the first two "books", which again, are remakes of the two Game Gear games, you unlock the third book. This is new content. What I liked about it is that you can actually import your saves from the first two books and use any members of either party. It's like an all-star team. Compared to the first two books, it's very short, only 6 or so battles total. But the battles are pretty tough! One of them has you actually pairing off against your own party, like Dark Link from Ocarina of Time! Because of that the battle will be totally unique depending on which members you have in your party. The final battle is a sort of boss rush where the bosses of all the previous battles in that chapter come back to wreck your day. I felt that the third book was a great little cherry on top of an already great package and rewards you for really developing both parties in the first two books.

    There's also a secret fourth book, but my heck, it is very very difficult. It is a pure boss rush. One single map with literally every boss unit from all three previous books. One thing about Shining Force is that enemy units can absolutely destroy you with very strong area of effect magic. And wouldn't you know it, the boss enemies typically have ridiculously strong magic! As a concept I thought it was pretty neat. However you do have a fixed party, so if you hadn't leveled up certain members that become mandatory in the fourth book, you're going to have a hard time. I gave it several attempts but eventually rage quit and watched someone play through on YouTube. It looks insanely difficult! To me, you'd almost have to play the previous three books fresh with the knowledge of which party members would be in the final book and specifically grind them to prepare. Which, honestly, feels like a great reason to replay the games because they're already so fun. If I was a kid who'd gotten this for Christmas, I probably would have also quit on the fourth book only to return months or years later to finish it off once and for all over a long boring summer break or something.

    _Shining Force_ is one of my favorite series! I did attempt to pick up _Shining Force II_ last year but got turned off because they added a lot more open world stuff and non-linearity. But I'm getting up the courage to try again. There's also a third game for the Saturn complete in three distinct parts, but I'm also scared of it because of the non-linearity. That's why I love the first game and especially the Game Gear games so much. Shining Force is awesome! I'm on the lookout for games similar to it but I'm not that interested in Fire Emblem or Final Fantasy Tactics.
  date: 6/14/26
  wiki: https://en.wikipedia.org/wiki/Shining_Force_CD

- title: "The Legend of Zelda: Ocarina of Time"
  platform: Nintendo 64
  developer: Nintendo EAD
  publisher: Nintendo
  year: 1998
  image: /public/media/posts/games/2026/oot.png
  text: |
    Generally speaking, I've never been a huge fan of _Super Mario 64_. Where I find _Super Mario World_ charming and refreshing, I find Mario 64 empty and depressing. The giant empty castle feels closer to _Alone in the Dark_ than it does to the charm of a Mario game. However, for Nintendo's first attempt to bring classic platforming to 3D, I can appreciate it's innovations. It's just not a game I enjoy playing very much. Much in the same vein, I've never been particularly drawn to _A Link to the Past_. Maybe I need to give it more of a chance, but it's just a bit overwhelming to me. So on paper, it's perhaps a bit odd that I love _Ocarina of Time_ as much as I do. Where Mario 64 feels empty, Ocarina feels full of possibility. Where _A Link to the Past_ feels overwhelming, Ocarina feels refined. There's a lot you _can_ do, but not so much that you _have_ to do.

    As a kid growing up in the 90's, my world was centered around our family's Nintendo 64. I can remember the first time I saw one in action, a demo unit in a Blockbuster video with Mario 64 running. The controller was completely broken and my brother couldn't figure out if there was something we didn't know how to do of if something was actually broken. We couldn't move, or if we could move, it was very slow. Perhaps the Achilles heel of the N64, the joystick, was totally shot. I'm fairly certain my cousin got an N64 on launch and I loved watching and playing _Shadows of the Empire_. It was much more fun to me than Mario 64 and far less overwhelming. I don't have a strong memory of the first time I saw Ocarina for the first time, but it was a game that was just kind of "everywhere". It seemed like any house that had an N64 also had at least one copy of Zelda. I do remember when we actually got our own copy of Ocarina. Some kid in the neighborhood was selling off his N64 stuff in order to get enough money together for (if I recall correctly) a Dreamcast. The timeline roughly adds up. Ocarina was released November 1998 and the Dreamcast was released not even a full year later in September 1999 (though it was released in Japan within a single week of Ocarina). It seems like there was a lot of hype for the Dreamcast, so it makes sense to me that someone would be selling off N64 stuff in anticipation.

    After we had our copy, I can remember my brother getting pretty into it. This was at a time where the internet wasn't fully integrated into daily life so a lot of the random secrets and tips were still sourced at the playground, an older brother, or if you were lucky the official strategy guide. It seems like I can remember him carefully seeking out all the extras including every Gold Skultula collectible. As the little brother, I did much more watching than playing but it was all very interesting and exciting to me to see all the different areas and especially to track the changes between child and adult link. Those freaking zombies in Hyrule Town scared the absolute crap out of me both then and now! The open world nature of the game makes it very easy for a little brother to pick up the older brother's save file and go explore some of the old locations just to have a little fun without really knowing what you're supposed to do. Just ride Epona around and go fishing type stuff. Later on, I can remember actually beating the game with my friend Carter. They had their own copy so we played at his house together, taking turns at different parts. When one of us got lost and confused in a dungeon, we'd trade off and the other would take a crack. I'm not sure what the split was but I think it was probably fairly close to 50/50. It seems like one night he finally got to the final Gannondorf battle but couldn't beat him so the next day he had me come over after school and we did it together. I'm sure we missed a ton of optional stuff, but the fact that we beat it felt like a huge accomplishment.

    All this to say, I've always had a special place in my heart for _Ocarina of Time_.

    As I've mentioned elsewhere, I have a little "retro gaming corner" in my office set up with a comfy chair, an M1 Mac Mini VESA mounted to an old Samsung 4:3 LCD monitor, and some thrifted Logitech computer speakers. I've gotten a surprising amount of use from it, playing old emulated games with a variety of controllers. I normally play a lot of games at my main desk, but I've been working hard at work lately and I feel like I need a good secondary place to sit that isn't just the same place I sit for 8 hours a day. It feels like a good mental separation between work and play, which I need when I work from home. I dipped my toes into a few different games before I finally sunk my teeth in to Ocarina. A while ago my other friend who is also named Carter helped me obtain one of those cool N64 Switch Online controllers which work great with a Mac. Having authentic input methods is super important to me, it's a huge part of the experience. The N64 Switch controller is really great, they fixed the lame joystick while preserving the feel of the original and the built in rumble feels very authentic to the original sans the huge bulky weight of the rumble pack hanging off the controller.

    Due to it's popularity, there are a lot of great ways to play Ocarina in 2026. I went with _Ship of Harkanian_ which I think is some kind of recompilation or something. It's still pretty much the authentic vanilla experience, with some really nice quality of life improvements including high refresh rate (the original runs at 20fps), and some speed bumps to slow repeated actions like climbing ladders. It's a great way to experience the classic. There are cheats available which I made light use of and were especially appreciated when my 5 year old wanted a turn to explore.

    How does the actual game hold up today? Incredibly well. It's honestly a bit mind blowing to me just how well Nintendo _nailed_ the translation of a Zelda game to 3D. Compared to this, Mario 64 feels like a tech demo that went on for way too long. _Ocarina of Time_ is an absolute _masterpiece_. The platforming is there, but that was proven in Mario. What really blows me away is the 3D puzzle/dungeon design. The highlight for me was the Forest Temple for sure. The entire experience is creepy, confusing, fun, and rewarding. The music! My gosh the music. Overall the soundtrack is great, but [the track for the Forest Temple is literally perfect](https://www.youtube.com/watch?v=c_G7Haf1aOI). It's like the original mainstream binaural beat. It is a bit spooky, but also aids with concentration as you untangle the puzzle of the temple. I can't believe they pulled this off. The Forest Temple alone might be one of my favorite individual sequences in any game I've ever played. I'd say it's perfect. The Water Temple gets a lot of hate, which I think is justified. I remember it being complained about on the playground as a kid, and I think they just kind of missed the mark a bit with the design on that one. It's not bad by any means, but there are a few parts that are really unintuitive and confusing. However the fight against Dark Link might be one of the greatest concepts in video game history. The final boss of the Water Temple also isn't great, it's like that alien thing from _The Abyss_ and just kind of not the most fun. The rest of the dungeons are pretty good, but none come close to the Forest Temple for me. Fitting for me that I finally beat Gannondorf again with my 5 year old at my side, coaching me through the timing of when to hit to reflect his energy balls, just like the first time I beat it 25 years ago. He's watched his friend fight Gannon in _Breath of the Wild_ so he seemed to be pretty familiar with what exactly was going on.

    I had a blast with _Ocarina of Time_. I'm curious to see what Nintendo cooks up for their announced remake that's supposed to be released later this year. It's hard to imagine they could substantially improve the masterpiece it already is. I should also mention I own and played the 3DS remaster as well, which is also great. I'm a little tempted to play through that version now, with the original fresh in my memory it would probably go quickly and it would be fun to compare the details. Plus, I've got an extra 3DS my kids could play along with me. For some reason, _Majora's Mask_ never really seemed interesting to me but I also might give that a whirl. My mind is drifting towards _Wind Waker_ but I've played through the opening sequence of that a handful of times and couldn't get my teeth into it. _Twilight Princess_ was such an incredible experience but I only played through it a few years ago. I have the _Skyward Sword_ remake for my Switch so that's also an option. As it stands I started _Minish Cap_, so we'll see if that goes anywhere!
  date: 6/29/26
  wiki: https://en.wikipedia.org/wiki/The_Legend_of_Zelda:_Ocarina_of_Time

- title: "The Legend of Zelda: Ocarina of Time 3D"
  platform: Nintendo 3DS
  developer: Grezzo
  publisher: Nintendo
  year: 2011
  image: /public/media/posts/games/2026/oot3d.jpg
  text: |
    "That is right! I did it! Are you kidding me? Who do you think you are I am!" Yes, I immediately played through the 3D remaster after beating the original. First things first, this is a remaster, not a remake. What's the difference? This game was built using the original source code, not built from the ground up. [This is actually confirmed by Nintendo in an entry in the "Iwata Asks" blog series](https://iwataasks.nintendo.com/interviews/3ds/zelda-ocarina-of-time/3/1/#:~:text=The%20trouble%20that%20the%20original%20staff%20had%20experienced%20was%20visible%20in%20the%20program%20source%20code.%20For%20example%2C%20there%20were%20remains%20of%20frantic%20calculations%20written%20in%20it%2C%20like%2010%20+%201%20+%202%20–%205.):

    > The trouble that the original staff had experienced was visible in the program source code. For example, there were remains of frantic calculations written in it, like 10 + 1 + 2 – 5.

    With the Switch 2 remake being announced, we don't know for sure if that will be a full remake or a remaster but we can guess that it will be a full remake. Only time will tell.

    Being a remaster, the 3DS version is incredibly faithful to the original. It plays identically down to cutscenes and quirks. As such, I feel that either version of the game are about equal, I can't say that one is vastly superior to the other. There are some small tweaks to make the water temple less annoying, but even on a fresh playthrough I still struggled with it more than I'd liked to have. I'm actually a fan of the 3DS' 3D capabilities and tried to make use of it. One of the best additions is gyroscope aiming. You kind of forget the 3DS even has that capability but aiming in the original was kind of clunky. Gyro aiming really speeds the whole thing up greatly and the implementation here is top notch. The only issue with it is that it doesn't work at all with the 3D. Even with my New 3DS improved head tracking, you have to hold the console almost still in order for it to work and when gyro aiming everything falls apart. I guess you win some, you lose some.

    I did an "express" playthrough, just going as fast as I could. I didn't go out of my way to gather heart pieces or do side quests. I didn't even get Epona which feels like it should be illegal. I can really see why this game is very popular for speedrunning. There's a rhythm about it that is just satisfying to fly through. I remember as a kid I went to my friend's house and his brother was fighting Gannondorf and messed up so I started making fun of him to which he responded "Give me a break, I just started this morning!" and that really blew my mind. Beat the whole game in under a day? How could it be? This playthrough took about one full day, you could easily get through it in 8 hours if you know what you're doing.

    If you have a 3DS, I'd recommend playing this! If you don't, you're not necessarily missing out on anything incredible. Since the Switch 2 version is supposed to come out this year, I might end up playing this game three times! I'm personally a bit skeptical that the remake will come out this year though based on the incredibly slim release trailer. Here's some math: The N64 game came out in 1998. The 3DS version was released in 2011. That's 13 years. If the Switch 2 version comes out this year, it will be 15 years after the 3DS version. Feel old yet? Not to mention Metroid Prime 4 took 8 years of development between being announced and being released. Time will tell!
  date: 7/3/26
  wiki: https://en.wikipedia.org/wiki/The_Legend_of_Zelda:_Ocarina_of_Time_3D

- title: "The Legend of Zelda: The Minish Cap"
  platform: Game Boy Advance
  developer: Capcom/Flagship
  publisher: Nintendo
  year: 2005
  image: /public/media/posts/games/2026/minishcap.png
  text: |
    I have a distinct memory of calling my local Game Stop at some point in 2004 and they answered the phone with "Thank you for calling Game Stop where you can... uhh... preorder... _The Legend of Zelda: The Minish Cap_ for the Game Boy Advance, how can I help you?" I did not take them up on that offer. Despite owning a GBA, I just didn't really have much interest in the game. I honestly haven't really had any interest in it until this year. It feels like a game that's kind of forgotten about a bit? Some people seem to really like it but it seems like most people haven't played it. I think for me _The Minish Cap_ just sounds kind of dumb? I don't really want a magical hat you know? Plus what is _minish_ anyway? Is that some material or color?

    After bouncing off _A Link to the Past_, I decided to give 2D Zelda another try. Like I've mentioned, I really like _Link's Awakening_ but I think that's about it as far as 2D Zelda. As a kid I borrowed one of the _Oracle_ games from someone and bounced off of it as well. Just didn't do it for me. _Minish Cap_ is basically a sequel to the _Oracle_ games because they're the only three Zelda games that were developed by Capcom (or more specifically their subsidiary _Flagship_). It's bizarre and interesting to me that Nintendo would allow their precious IP to be developed by Capcom. While _Street Fighter II_ is very nostalgic for me, I can't say I've ever really spent much time with a Capcom game other than _Power Stone II_ and _Mega Man Battle Network 3_. They seem like they have a great grip on 2D fighting games, and back in the day they really knew how to make one heck of a platformer, but since the mid-90's I can't say they've been up to anything particularly interesting to me outside of the _MMBN_ series.

    _Minish Cap_ to me just doesn't really _feel_ like a Zelda game. I can't quite place my finger on why. There's just something about the whole premise that just doesn't feel right. That isn't to say it's not a good game, I think it's fine. I didn't love it. I didn't hate it. The gimmick here is that there are these little tiny people called the ~~Picori~~ _Minish_. They are magical and did something to seal some dark power, or something. You find this magic hat called _The Minish Cap__ which talks to you and allows you to shrink down to Minish size. The entire shrinking concept was a bit half baked for me. It mostly allows you to interact with things differently like entering a bunch of random mouse holes that are everywhere. I don't know, it's just not that interesting to me.

    For music, there are a few background tracks that sound pretty great. There's just not that many of them. You get the traditional overworld theme and dungeon theme which sound fine here but are nothing to write home about. A lot of the sound effects feel a little too crunchy to me. Some of the graphics also feel a bit underwhelming. My gut says this game shares a little too much heritage with the _Oracle_ games on the Game Boy Color. One of the most annoying things about the other Game Boy Zelda games is that you can only have two items equipped at a time, each mapped to A and B. Despite the GBA having two additional buttons, the developers opted to keep that aspect and still require you do a bunch of menuing to switch items. R does a roll, and L is literally dedicated to trading "kinstones".

    What are "kinstones"? They're just these random medallions that are split in half in different colors and patterns. You just walk up to NPCs and hit L and they _might_ want to "fuse" them with you. Kinstones are collected randomly and also found in certain chests. Most of the time fusing them unlocks some random thing like money, others give you heart pieces or non-essential items. Some parts of the game require you to fuse them to progress. I would have much, much preferred the ability to keep an item mapped to R and L and have the kinstone thing either be nonexistant or it's own item you can map when you actually need to do it.

    Finally, there's this vending machine thing that you spend "Mysterious Shells" to try and redeem. It dispenses miniatures of enemies and people from the game. What's the point? No clue. Supposedly if you get every single mini you are rewarded with an item that's useless. It's just a total gimmick and requires a ton of super tedious menuing and dialog. Not fun! What the heck!

    I think that's why the vibe for me feels more like someone trying to make a Zelda game and not actually a Zelda game. Zelda games are more refined than what I got in _Minish Cap_. If it had instead been it's own IP it would still be one of the best games on the GBA, but as a Zelda title it's probably a low point in the series for me. I even prefer the DS entries over this one.
