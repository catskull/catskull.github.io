- url: https://en.wikipedia.org/wiki/Warez?wprov=sfti1#
  created: '2025-10-22T04:00:01Z'
  title: |
    Warez
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/2/27/Pro_piracy_demonstration.jpg/330px-Pro_piracy_demonstration.jpg
  image_wh: 330x228
  description: |
    Movies, software or music distributed in violation of copyright
  extract: |
    Warez is a common computing and broader cultural term referring to pirated software that is distributed via the Internet. Warez is used most commonly as a noun, a plural form of ware, and is intended to be pronounced like the word wares. The circumvention of copy protection (cracking) is an essential step in generating warez, and based on this common mechanism, the software-focused definition has been extended to include other copyright-protected materials, including movies and games. The global array of warez groups has been referred to as "The Scene", deriving from its earlier description as "the warez scene". Distribution and trade of copyrighted works without payment of fees or royalties generally violates national and international copyright laws and agreements. The term warez covers supported as well as unsupported (abandonware) items, and legal prohibitions governing creation and distribution of warez cover both profit-driven and "enthusiast" generators and distributors of such items.
- url: https://en.wikipedia.org/wiki/Acute_radiation_syndrome?wprov=sfti1#
  created: '2025-10-22T04:04:46Z'
  title: |
    Acute radiation syndrome
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/Autophagosomes.jpg/330px-Autophagosomes.jpg
  image_wh: 330x246
  description: |
    Result of nuclear radiation exposure
  extract: |
    Acute radiation syndrome (ARS), also known as radiation sickness or radiation poisoning, is a collection of health effects that are caused by being exposed to high amounts of ionizing radiation in a short period of time. Symptoms can start within an hour of exposure, and can last for several months. Early symptoms are usually nausea, vomiting and loss of appetite. In the following hours or weeks, initial symptoms may appear to improve, before the development of additional symptoms, after which either recovery or death follows.
- url: https://en.wikipedia.org/wiki/Harry_Daghlian?wprov=sfti1#Criticality_accident_and_death
  created: '2025-10-22T04:06:48Z'
  title: |
    Harry Daghlian
  image_url: https://upload.wikimedia.org/wikipedia/commons/4/4d/Harry-K-Daghlian.gif
  image_wh: 250x320
  description: |
    American physicist (1921–1945)
  extract: |
    Haroutune Krikor Daghlian Jr. was an American physicist with the Manhattan Project, which designed and produced the atomic bombs that were used in World War II. He accidentally irradiated himself on August 21, 1945, during a critical mass experiment at the remote Omega Site of the Los Alamos Laboratory in New Mexico and died 25 days later from the resultant radiation poisoning.
- url: https://en.wikipedia.org/wiki/Demon_core?wprov=sfti1#First_incident
  created: '2025-10-22T04:13:56Z'
  title: |
    Demon core
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Partially-reflected-plutonium-sphere.jpeg/330px-Partially-reflected-plutonium-sphere.jpeg
  image_wh: 330x264
  description: |
    1945–1946 sphere of plutonium
  extract: |
    The demon core was a sphere of plutonium–gallium alloy that was involved in two fatal radiation accidents when scientists tested it as a fissile core of an early atomic bomb. It was manufactured in 1945 by the Manhattan Project, the U.S. nuclear weapon development effort during World War II. It was a subcritical mass that weighed 6.2 kilograms (14 lb) and was 89 millimeters (3.5 in) in diameter. The core was prepared for shipment to the Pacific Theater as part of the third nuclear weapon intended to be dropped on Japan, but when Japan surrendered, the core was retained for testing and potential later use in the case of another conflict.
- url: https://en.wikipedia.org/wiki/Tool_use_by_non-humans?wprov=sfti1#Definitions_and_terminology
  created: '2025-10-22T22:58:54Z'
  title: |
    Tool use by non-human animals
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/b/bc/Macaca_fascicularis_aurea_using_a_stone_tool_-_journal.pone.0072872.g002f.png/330px-Macaca_fascicularis_aurea_using_a_stone_tool_-_journal.pone.0072872.g002f.png
  image_wh: 330x339
  description: |
    
  extract: |
    A wide range of non-human animals, including mammals, birds, fish, cephalopods and insects, use tools in order to achieve a goal, such as acquiring food and water, grooming, combat, defence, communication, recreation, or construction. Some tool use requires a sophisticated level of cognition. There is considerable discussion about the definition of what constitutes a tool and therefore which behaviours can be considered to be tool use. The fashioning of tools is much rarer than the use of existing objects as tools, and is only attested from mammals and birds.
