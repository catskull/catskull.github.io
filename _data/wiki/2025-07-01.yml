- url: https://en.wikipedia.org/wiki/Aaron_Sorkin?wprov=sfti1#
  created: '2025-07-01T05:53:53Z'
  title: |
    Aaron Sorkin
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Aaron_Sorkin_%2827566400913%29.jpg/330px-Aaron_Sorkin_%2827566400913%29.jpg
  image_wh: 330x495
  description: |
    American screenwriter, playwright, and filmmaker (born 1961)
  extract: |
    Aaron Benjamin Sorkin is an American screenwriter, playwright, and filmmaker. As a writer for stage, television, and film, he is recognized for his trademark fast-paced dialogue and extended monologues, complemented by frequent use of the storytelling technique called the "walk and talk". Sorkin has earned numerous accolades including an Academy Award, a BAFTA Award, five Primetime Emmy Awards, three Golden Globes, and two WGA Awards, in addition to a Laurence Olivier Award nomination.
- url: https://en.wikipedia.org/wiki/Xenobot
  created: '2025-07-01T17:16:40Z'
  title: |
    Xenobot
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/A_xenobot_in_simulation_and_reality.png/330px-A_xenobot_in_simulation_and_reality.png
  image_wh: 330x155
  description: |
    Artificial organism
  extract: |
    Xenobots, named after the clawed frog, are synthetic lifeforms that are designed by computers to perform some desired function and built by combining together different biological tissues. There is debate among scientists whether xenobots are robots, organisms, or something else entirely.
- url: https://en.wikipedia.org/wiki/Sister_Christian
  created: '2025-07-01T17:32:46Z'
  title: |
    Sister Christian
  image_url: https://upload.wikimedia.org/wikipedia/en/3/34/Night_Ranger_Sister_Christian.jpg
  image_wh: 314x317
  description: |
    1984 single by Night Ranger
  extract: |
    "Sister Christian" is a song by the American band Night Ranger. A power ballad, it was released in March 1984 as the second single from their second album Midnight Madness (1983). It was written and sung by the band's drummer, Kelly Keagy, for his sister. It was the band's biggest hit, peaking at number five on the US Billboard Hot 100, and staying on the charts for 24 weeks. It also reached No. 1 in Canada. The song is used in several films, including Boogie Nights (1997), Superstar (1999), Friday the 13th (2009), and Air (2023). The song is also used in South Park season 28 episode 1, "Twisted Christian". It was ranked number 32 on VH1's 100 Greatest Songs of the 1980s. It is also featured in the 2002 videogame Grand Theft Auto Vice City on the in-game radio station Emotion 98.3.
- url: https://en.wikipedia.org/wiki/Cruising_(driving)
  created: '2025-07-01T17:32:51Z'
  title: |
    Cruising (driving)
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Cruise_on_Colby_%2817662461654%29.jpg/330px-Cruise_on_Colby_%2817662461654%29.jpg
  image_wh: 330x248
  description: |
    Traveling by car for pleasure
  extract: |
    Cruising is a social activity that primarily consists of driving a car. Cruising is distinguished from regular driving by the social and recreational nature of the activity, which is characterized by an impulsively random, often aimless course. A popular route is often the focus of cruising. Cruising can be an expression of the freedom of possessing a driver's license. "Cruise nights" are evenings during which cars drive slowly.
- url: https://en.wikipedia.org/wiki/Of_the_form
  created: '2025-07-01T18:22:10Z'
  title: |
    Of the form
  image_url: 
  image_wh: 
  description: |
    Mathematical phrase
  extract: |
    In mathematics, the phrase "of the form" indicates that a mathematical object, or a collection of objects, follows a certain pattern of expression. It is frequently used to reduce the formality of mathematical proofs.
- url: https://en.wikipedia.org/wiki/What_to_the_Slave_Is_the_Fourth_of_July%3F
  created: '2025-07-01T19:51:30Z'
  title: |
    What to the Slave Is the Fourth of July?
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/2/21/Frederick_Douglass_by_Samuel_J_Miller%2C_1847-52.png/330px-Frederick_Douglass_by_Samuel_J_Miller%2C_1847-52.png
  image_wh: 330x457
  description: |
    1852 speech by Frederick Douglass
  extract: |
    "What to the Slave Is the Fourth of July?" was a speech delivered by Frederick Douglass on July 5, 1852, at Corinthian Hall in Rochester, New York, at a meeting organized by the Rochester Ladies' Anti-Slavery Society. In the address, Douglass states that positive statements about perceived American values, such as liberty, citizenship, and freedom, were an offense to the enslaved population of the United States because they lacked those rights. Douglass referred not only to the captivity of slaves, but to the merciless exploitation and the cruelty and torture that slaves were subjected to in the United States.
- url: https://en.wikipedia.org/wiki/Miracle#:~:text=A%20miracle%20is%20an%20event,some%20supernatural%20or%20praeternatural%20cause.
  created: '2025-07-01T19:56:18Z'
  title: |
    Miracle
  image_url: 
  image_wh: 
  description: |
    Event not explicable by natural or scientific laws
  extract: |
    A miracle is an event that cannot be explained by natural or scientific laws and accordingly gets attributed to some supernatural or preternatural cause. Various religions often attribute a phenomenon characterized as miraculous to the actions of a supernatural being, especially by a deity, a miracle worker, a saint, or a religious leader.
- url: https://en.wikipedia.org/wiki/Space_Pen
  created: '2025-07-01T20:18:32Z'
  title: |
    Space Pen
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/2/27/AG-7_Space_Pen.JPG/330px-AG-7_Space_Pen.JPG
  image_wh: 330x223
  description: |
    Gravity-independent ballpoint pen
  extract: |
    The Space Pen, marketed by Fisher Space Pen Company, is a pen that uses pressurized ink cartridges and is able to write in zero gravity, underwater, over wet and greasy paper, at any angle, and in a very wide range of temperatures.
