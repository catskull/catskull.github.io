  extract: |
    Frederick Bean "Tex" Avery was an American animator, film director and voice actor. He was known for directing and producing animated cartoons during the golden age of American animation. His most significant work was for Warner Bros. Cartoons and Metro-Goldwyn-Mayer's cartoon department, where he was crucial in the creation and evolution of famous animated characters such as Bugs Bunny, Daffy Duck, Porky Pig and Elmer Fudd for Warner Bros. and Droopy, Butch Dog, Screwy Squirrel, The Wolf, Red Hot Riding Hood, and George and Junior for Metro-Goldwyn-Mayer.
