  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Castle_and_brewery_in_Kol%C3%ADn_2.jpg/330px-Castle_and_brewery_in_Kol%C3%ADn_2.jpg
  image_wh: 330x248
  description: |
    Façade making something seem better than in reality
  extract: |
    A Potemkin village is a construction, literal or figurative, that provides a façade to a situation, to make people believe that the situation is better than it actually is.
- url: https://en.wikipedia.org/wiki/Can_you_hear_me%3F_(alleged_telephone_scam)?wprov=sfti1
  created: '2025-08-08T22:18:05Z'
  title: |
    Can you hear me? (alleged telephone scam)
  image_url: 
  image_wh: 
  description: |
    Alleged telephone scam
  extract: |
    "Can you hear me?" is a question asked in an alleged telephone scam, sometimes classified as an internet hoax. There is no record of anyone having ever been defrauded in such a scam, according to the Better Business Bureau, the Federal Trade Commission, and the Consumer Federation of America. Reports of the supposed scam began circulating in the United States and Canada in 2017.
