  extract: |
    Constitutional avoidance is a legal doctrine of judicial review in United States constitutional law that dictates that United States federal courts should refuse to rule on a constitutional issue if the case can be resolved without involving constitutionality. In Ashwander v. Tennessee Valley Authority (1936), Justice Louis D. Brandeis established a seven-rule test for the justiciability of controversies presenting constitutional questions:Collusive lawsuit rule: The Court will not [rule] upon the constitutionality of legislation in a friendly, nonadversary, proceeding, declining because to decide such questions "is legitimate only in the last resort, and as a necessity in the determination of real, earnest and vital controversy between individuals. It never was the thought that, by means of a friendly suit, a party beaten in the legislature could transfer to the courts an inquiry as to the constitutionality of the legislative act."
    Ripeness: The Court will not "anticipate a question of constitutional law in advance of the necessity of deciding it."
    Minimalism: The Court will not "formulate a rule of constitutional law broader than is required by the precise facts to which it is to be applied."
    Last resort rule: The Court will not [rule] upon a constitutional question, although properly presented by the record, if there is also present some other ground upon which the case may be disposed of. ... [I]f a case can be decided on either of two grounds, one involving a constitutional question, the other a question of statutory construction or general law, the Court will decide only the latter.
    Standing; Mootness: The Court will not [rule] upon the validity of a statute upon complaint of one who fails to show that he is injured by its operation.
    Constitutional estoppel: The Court will not [rule] upon the constitutionality of a statute at the instance of one who has availed himself of its benefits.
    Constitutional avoidance canon: "When the validity of an act of the Congress is drawn in question, and even if a serious doubt of constitutionality is raised, it is a cardinal principle that this Court will first ascertain whether a construction of the statute is fairly possible by which the question may be avoided."
