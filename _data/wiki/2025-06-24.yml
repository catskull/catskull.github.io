  title: |
    Napoleon
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/5/50/Jacques-Louis_David_-_The_Emperor_Napoleon_in_His_Study_at_the_Tuileries_-_Google_Art_Project.jpg/330px-Jacques-Louis_David_-_The_Emperor_Napoleon_in_His_Study_at_the_Tuileries_-_Google_Art_Project.jpg
  image_wh: 330x550
  description: |
    French general and emperor (1769–1821)
  extract: |
    Napoleon Bonaparte, later known by his regnal name Napoleon I, was Emperor of the French from 18 May 1804 until his first abdication in 1814, with a brief restoration during the Hundred Days in 1815. He rose to prominence as a general during the French Revolution and led a series of military campaigns across Europe and the Middle East during the French Revolutionary and Napoleonic Wars. As a statesman, he implemented numerous legal and administrative reforms in France and Europe.
- url: https://en.wikipedia.org/wiki/White_dwarf?wprov=sfti1#
  created: '2025-06-24T15:13:43Z'
  title: |
    White dwarf
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/Sirius_A_and_B_Hubble_photo.editted.PNG/330px-Sirius_A_and_B_Hubble_photo.editted.PNG
  image_wh: 330x360
  description: |
    Stellar core remnant
  extract: |
    A white dwarf is a very dense type of star: in an Earth-sized volume, it packs a mass that is comparable to the Sun. A white dwarf radiates light from residual heat and eventual crystallization, not from nuclear fusion. Stars like the Sun, whose mass is not high enough to collapse into a neutron star or black hole, are expected to become white dwarf stars later in their evolution. The nearest known white dwarf is Sirius B, at 8.6 light years, the smaller component of the Sirius binary star.
- url: https://en.wikipedia.org/wiki/Stellar_evolution?wprov=sfti1
  created: '2025-06-24T15:14:24Z'
  title: |
    Stellar evolution
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Triangle_of_everything_-_Stellar_Evolution.png/330px-Triangle_of_everything_-_Stellar_Evolution.png
  image_wh: 330x330
  description: |
    Changes to stars over their lifespans
  extract: |
    Stellar evolution is the process by which a star changes over the course of time. Depending on the mass of the star, its lifetime can range from a few million years for the most massive to trillions of years for the least massive, which is considerably longer than the current age of the universe. The table shows the lifetimes of stars as a function of their masses. All stars are formed from collapsing clouds of gas and dust, often called nebulae or molecular clouds. Over the course of millions of years, these protostars settle down into a state of equilibrium, becoming what is known as a main sequence star.
