  created: '2026-07-23T18:19:39Z'
  title: |
    Law of triviality
  image_url: 
  image_wh: 
  description: |
    Focusing on what is irrelevant but easy to understand
  extract: |
    The law of triviality is C. Northcote Parkinson's 1957 argument that people within an organization commonly give disproportionate weight to trivial issues. Parkinson provides the example of a fictional committee whose job was to approve the plans for a nuclear power plant spending the majority of its time on discussions about relatively minor but easy-to-grasp issues, such as what materials to use for the staff bicycle shed, while neglecting the proposed design of the plant itself, which is far more important and a far more difficult and complex task.
- url: https://en.wikipedia.org/wiki/Narcissism_of_small_differences
  created: '2026-07-23T18:38:39Z'
  title: |
    Narcissism of small differences
  image_url: 
  image_wh: 
  description: |
    Over-focus on minor social differences
  extract: |
    In psychoanalysis, the narcissism of small differences is the idea that when people in a relationship or community have a lot in common, they can actually be more likely to fight with each other and mock each other, because they become overly sensitive to small differences they notice in one another and treat those differences as bigger than they are. The term was coined by Sigmund Freud in 1917, based on the earlier work of English anthropologist Ernest Crawley. Crawley theorized that each individual is separated from others by a taboo of personal isolation, which is effectively a narcissism of minor differences.
