    Meow, also known as Meow the obese cat, was a male domestic cat who attracted international attention when an animal shelter publicized efforts to slim him down, in an attempt to have him adopted. However, Meow died of lung failure two weeks after entering the animal shelter, on May 5, 2012. He was the world's heaviest cat at his time of death, weighing 39.7 pounds.
