  title: |
    LithTech
  image_url: https://upload.wikimedia.org/wikipedia/en/5/5c/Jupiter_Ex.PNG
  image_wh: 109x144
  description: |
    Game engine
  extract: |
    LithTech is a discontinued game engine developed by Monolith Productions and comparable with the Quake and Unreal engines. Monolith and a number of other video game developers have used LithTech as the basis for their first-person shooter games.
- url: https://en.wikipedia.org/wiki/Rage_of_Mages
  created: '2025-09-26T23:55:22Z'
  title: |
    Rage of Mages
  image_url: https://upload.wikimedia.org/wikipedia/en/7/70/Rage_of_Mages_cover.jpg
  image_wh: 294x339
  description: |
    1998 video game
  extract: |
    Rage of Mages is a PC game that combines role-playing and real-time strategy. Produced by Nival Interactive it was first released in Russia under the name of Allods: The Seal of Mystery. The game was published in April 1998 in the EU by Buka Entertainment and on October 13, 1998 in the US. It was re-released in 2016 on GOG.com.
