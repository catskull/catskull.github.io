    Series of video game consoles specialized for airlines and hotels
  extract: |
    The Nintendo Gateway System is a series of video game consoles specialized for airlines and hotels. As part of a partnership between Nintendo and LodgeNet from late 1993 up until the late 2000s, about 40,000 airline seats and 955,000 hotel rooms featured a modified version of the Super Nintendo Entertainment System, Game Boy, Game Boy Color, Game Boy Advance, Nintendo 64, or GameCube, installed on some Northwest, Singapore Airlines, Air China, Air Canada, American Airlines, Alitalia-Linee Aeree Italiane, All Nippon Airways, British Midland International, Kuwait Airways, Malaysia Airlines, Thai Airways, and Virgin Atlantic passenger aircraft, as well as certain hotels with LodgeNet, NXTV, or Quadriga entertainment systems.
