  description: |
    Exclamation given aboard a vessel to indicate that someone has fallen off of the ship
  extract: |
    "Man overboard!" is an exclamation given aboard a vessel to indicate that a member of the crew or a passenger has fallen off of the ship into the water and is in need of immediate rescue. Whoever sees the person fall is to shout a version of, "Overboard!" The call is then repeated once by every crew member within earshot, even if they have not seen the victim fall, until everyone on deck has heard and given the same call. This ensures that all other crew have been alerted to the situation and notifies the officers of the need to act immediately to save the victim. Pointing continuously at the victim may aid the helmsman in approaching the victim.
