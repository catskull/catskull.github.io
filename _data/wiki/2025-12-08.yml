    The 2009–11 Toyota vehicle recalls involved a series of global corrective actions to automobiles by the Japanese manufacturer, Toyota Motor Corporation. Approximately 9 million vehicles were affected due to reports of sudden unintended acceleration. The crisis, which affected Toyota's reputation, was initially attributed to mechanical defects: "pedal entrapment" caused by floor mats and "sticking accelerator pedals" resulting from friction in the pedal assembly. However, litigation in 2013 challenged these findings. Expert testimony suggested that software problems in the car's Electronic Throttle Control System could trigger unintended acceleration. The complex interplay of mechanical failures, software vulnerabilities, and regulatory scrutiny culminated in a significant safety event and penalties for the automaker.
