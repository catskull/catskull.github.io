  title: |
    Superior Defender Gundam Force
  image_url: https://upload.wikimedia.org/wikipedia/en/2/24/SDGUNDAMFORCE.jpg
  image_wh: 266x375
  description: |
    Japanese anime television series
  extract: |
    Superior Defender Gundam Force, or SD Gundam Force , is a 2004 Japanese-American anime television series produced by Sunrise. The series was released to celebrate the 25th anniversary of the Gundam media franchise, and was the first Gundam series to be entirely animated in cel-shaded 3D computer graphics (3DCG), and the first full-3DCG series to be broadcast on Japanese television. The show was directed by Yūichi Abe.
- url: https://en.wikipedia.org/wiki/Beat_City?wprov=sfti1
  created: '2025-08-11T03:50:52Z'
  title: |
    Beat City
  image_url: https://upload.wikimedia.org/wikipedia/en/5/51/BeatCityUniversomo.jpg
  image_wh: 237x212
  description: |
    2010 video game
  extract: |
    Beat City is a 2010 rhythm video game developed by Universomo and published by THQ for the Nintendo DS. It was released on April 20, 2010, in North America, and in Europe on June 11, 2010. It was the first and only video game to be developed for a handheld system by Universomo, who mostly worked on mobile games and was shuttered a month before the game's release.
- url: https://en.wikipedia.org/wiki/Satellaview
  created: '2025-08-11T22:07:33Z'
  title: |
    Satellaview
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/4/49/Satellaview_with_Super_Famicom.jpg/330px-Satellaview_with_Super_Famicom.jpg
  image_wh: 330x330
  description: |
    Video game console peripheral
  extract: |
    The Satellaview is a satellite modem peripheral for the Super Famicom, produced by Nintendo as part of the fourth generation of video game consoles. It was released in Japan on April 23, 1995, as the successor to the Famicom's Network System. Containing a megabyte of ROM space and 512 kilobytes of RAM, the Satellaview allowed players to download games, magazines, and other media through satellite broadcasts provided by St.GIGA. Players purchased or rented a broadcast satellite tuner. It attaches to the expansion port on the bottom of the Super Famicom. The Satellaview received extensive support from third-party developers, including SquareSoft, Taito, Konami, Capcom, and Seta.
- url: https://en.wikipedia.org/wiki/St.GIGA
  created: '2025-08-11T22:19:00Z'
  title: |
    St.GIGA
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/5/56/Nisseki_Yokohama_Billding.JPG/330px-Nisseki_Yokohama_Billding.JPG
  image_wh: 330x520
  description: |
    Defunct Japanese satellite radio broadcaster
  extract: |
    Satellite Digital Audio Broadcast Co., Ltd. , trading as St.GIGA , was a Japanese satellite radio company headquartered in Akasaka, Tokyo. The company was established on 2 April 1990 as a subsidiary of the television station provider WOWOW, achieving a cult following through its "Tide of Sound" nature sounds recording broadcasts and its nonstandard methodology. By 1994, St.GIGA was struggling financially due to Japan's economic stagnation affecting the demand for its ambient music, as consumers became reluctant to invest in satellite tuners.
