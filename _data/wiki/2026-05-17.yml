  description: |
    French culinary term referring to preparation
  extract: |
    Mise en place is a French culinary phrase which means "putting into place". It refers to the setup required before cooking, and is often used in professional kitchens to refer to organizing and arranging the ingredients that a cook will require for the menu items that are expected to be prepared during a shift.
