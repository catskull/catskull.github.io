    Cowboy Bebop  is a Japanese neo-noir space Western anime television series that aired on TV Tokyo and Wowow from 1998 to 1999. Created and animated by Sunrise, it was led by a production team of director Shinichirō Watanabe, screenwriter Keiko Nobumoto, character designer Toshihiro Kawamoto, mechanical designer Kimitoshi Yamane, and composer Yoko Kanno, who are collectively billed as Hajime Yatate. The series, which ran for twenty-six episodes, is set in the year 2071 and follows the lives of a traveling bounty-hunting crew aboard a spaceship, the Bebop. Although it incorporates a wide variety of genres, the series draws most heavily from science fiction, Western, and noir films. It explores themes such as existential boredom, loneliness, and the inability to escape one's past.
