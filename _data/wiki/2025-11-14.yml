- url: https://en.wikipedia.org/wiki/Jevons_paradox
  created: '2025-11-14T21:51:42Z'
  title: |
    Jevons paradox
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/4/42/CottonopolisCropped.jpg/330px-CottonopolisCropped.jpg
  image_wh: 330x236
  description: |
    Efficiency leads to increased demand
  extract: |
    The Jevons paradox or Jevons effect is an economic phenomenon said to occur when technological improvements that increase the efficiency of a resource's use lead to a rise, rather than a fall, in total consumption of that resource. Greater efficiency reduces the amount of the resource needed per application, lowering its effective cost; if demand is sufficiently price elastic, this induces demand, frequently resulting in a net increase of total resource consumption.
- url: https://en.wikipedia.org/wiki/Hedonic_treadmill
  created: '2025-11-14T21:52:18Z'
  title: |
    Hedonic treadmill
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/1/11/Hedonic_treadmill.svg/330px-Hedonic_treadmill.svg.png
  image_wh: 330x286
  description: |
    Psychological concept
  extract: |
    The hedonic treadmill, also known as hedonic adaptation, is the conjecture that humans quickly return to a relatively stable level of happiness despite major positive or negative events or life changes. According to this theory, as a person makes more money, expectations and desires rise in tandem, which results in no permanent gain in happiness.
