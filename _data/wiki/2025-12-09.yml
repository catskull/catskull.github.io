  description: |
    1959 Mexican film
  extract: |
    Santa Claus is a 1959 Mexican fantasy film directed by René Cardona, co-written by Adolfo Torres Portillo, and starring José Elías Moreno, Cesáreo Quezadas "Pulgarcito", Queta Lavat, Leopoldo «Polo» Ortin and Nora Veryán. This film marked the film debut of the actress Graciela Lara.
