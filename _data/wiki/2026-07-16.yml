    The list of cloud types groups all genera as high, middle (alto-), multi-level, and low. These groupings are determined by the altitude level or levels in the troposphere at which each of the various cloud types are normally found. Small cumulus are commonly grouped with the low clouds because they do not show significant vertical extent. Of the multi-level genus-types, those with the greatest convective activity are often grouped separately as towering vertical. The genus types all have Latin names.
