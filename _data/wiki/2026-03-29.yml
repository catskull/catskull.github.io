  description: |
    Thought experiment in philosophy
  extract: |
    In philosophy of mind, a philosophical zombie is a being in a thought experiment that is physically identical to a normal human being but does not have conscious experience. For example, if a philosophical zombie were poked with a sharp object, it would not feel any pain, but it would react exactly the way any conscious human would. In other words, the being has full access consciousness but no phenomenal consciousness.
