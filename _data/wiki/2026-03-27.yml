  extract: |
    Asemic writing is a wordless open semantic form of writing. The word asemic means "having no specific semantic content", or "without the smallest unit of meaning". Asemic writing fuses text and image together, while minimising the use of gestures, lines and symbols. Its non-specificity leaves readers to interpret its meaning – such works can have multiple meanings that evolve over time. The open nature of asemic works allows for meaning to occur across linguistic understanding; an asemic text may be "read" in a similar fashion regardless of the reader's natural language.
