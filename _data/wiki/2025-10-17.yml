    A doof or bush doof is a type of outdoor dance party generally held in a remote country area, or outside a large city in surrounding bush or rain-forest. The term doof was first popularized in Australia and New Zealand and can be repeated to varying degrees depending on the speaker’s disposition, intended emphasis or simply as an explanatory means. The term has since gained international usage for similar events, often propagated by small sets of social groups to grow into a subculture with millions of active members, and is considered by some as a cultural movement. Doofs share many features with other outdoor parties scenes around the world, such as raves, teknivals and free parties. They often have healing workshops, speakers, art, live bands, performance art, and DJs playing a range of electronic music.
