- url: https://en.wikipedia.org/wiki/Bomberman_Hero
  created: '2025-08-30T02:36:55Z'
  title: |
    Bomberman Hero
  image_url: https://upload.wikimedia.org/wikipedia/en/thumb/1/1c/Bomberman_Hero_box.jpg/330px-Bomberman_Hero_box.jpg
  image_wh: 330x230
  description: |
    1998 video game
  extract: |
    Bomberman Hero is a platform video game developed by A.I Co., Ltd. and published by Hudson Soft for the Nintendo 64. It is the second Bomberman game to be released on the system, following Bomberman 64 (1997). It is notable for being a dramatic deviation from previous Bomberman titles, featuring predominant platforming gameplay as opposed to the series' traditional top-down strategy gameplay.
- url: https://en.wikipedia.org/wiki/Demarcation_problem?wprov=sfti1
  created: '2025-08-30T06:33:18Z'
  title: |
    Demarcation problem
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Logical_positivists_collage_free.png/330px-Logical_positivists_collage_free.png
  image_wh: 330x330
  description: |
    Philosophical question of how to distinguish between science and non-science
  extract: |
    In philosophy of science and epistemology, the demarcation problem is the question of how to distinguish between science and non-science. It also examines the boundaries between science, pseudoscience and other products of human activity, like art and literature and beliefs. The debate continues after more than two millennia of dialogue among philosophers of science and scientists in various fields. The debate has consequences for what can be termed "scientific" in topics such as education and public policy.
