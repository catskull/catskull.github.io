  image_url: 
  image_wh: 
  description: |
    Aesop's fable
  extract: |
    The North Wind and the Sun is one of Aesop's Fables. It is type 298 in the Aarne–Thompson folktale classification. The moral it teaches - the superiority of persuasion over force - has made the story widely known. It has also become a chosen text for phonetic transcriptions.
