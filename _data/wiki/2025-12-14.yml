- url: https://en.wikipedia.org/wiki/Hypnic_jerk?wprov=sfti1#Treatment
  created: '2025-12-14T02:01:35Z'
  title: |
    Hypnic jerk
  image_url: 
  image_wh: 
  description: |
    Involuntary twitching while falling asleep
  extract: |
    A hypnic jerk is defined as a brief and sudden involuntary contraction of the muscles of the body which occurs when a person is beginning to fall asleep, often causing the person to jump and awaken suddenly for a moment. Hypnic jerks are one form of involuntary muscle twitches called myoclonus.
- url: https://en.wikipedia.org/wiki/Exploding_head_syndrome?wprov=sfti1#Signs_and_symptoms
  created: '2025-12-14T02:36:10Z'
  title: |
    Exploding head syndrome
  image_url: 
  image_wh: 
  description: |
    Abnormal sensory perception during sleep
  extract: |
    Exploding head syndrome (EHS) is classified as a sleep disorder or headache disorder. It occurs when someone falls asleep or wakes up to loud auditory hallucinations. These noises may sound like explosions or thunder and do not tend to last long, but they can still be frightening and may make it harder to sleep. There is typically no pain associated with EHS, and it doesn't lead to other conditions, so it is considered harmless. While in general EHS is a rare occurrence, some people hear the loud noises multiple times a night. Other symptoms of EHS include seeing a flash of light, feeling a tingling sensation run through the body, or suddenly feeling hot.
- url: https://en.wikipedia.org/wiki/Penny-farthing?wprov=sfti1#
  created: '2025-12-14T18:49:36Z'
  title: |
    Penny-farthing
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/15-mile_Penny_Farthing_Race%2C_Harvard_University_Cycling_Association_in_1887.png/330px-15-mile_Penny_Farthing_Race%2C_Harvard_University_Cycling_Association_in_1887.png
  image_wh: 330x230
  description: |
    Early type of bicycle
  extract: |
    The penny-farthing, also known as a high wheel, high wheeler or ordinary, is an early type of bicycle distinguished by its large front wheel and comparatively small back wheel. It was popular in the 1870s and 1880s, with its large front wheel providing high speeds, owing to its travelling a long distance for every rotation of the wheel. These bicycles had solid rubber tires and as a consequence the only shock absorption was in the saddle.
