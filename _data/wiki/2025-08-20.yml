- url: https://en.wikipedia.org/wiki/Propaganda
  created: '2025-08-20T18:53:28Z'
  title: |
    Propaganda
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/I_Want_You_for_U.S._Army_by_James_Montgomery_Flagg.jpg/330px-I_Want_You_for_U.S._Army_by_James_Montgomery_Flagg.jpg
  image_wh: 330x443
  description: |
    Communication used to influence opinion
  extract: |
    Propaganda is a form of communication that is primarily used to influence an audience and persuade them to further an agenda. Propaganda may not be objective and often selectively presents facts to encourage a particular perception, or uses loaded language to produce an emotional rather than a rational response to the information presented. Propaganda can be found in a wide variety of different contexts.
- url: https://en.wikipedia.org/wiki/Ideology
  created: '2025-08-20T18:56:59Z'
  title: |
    Ideology
  image_url: 
  image_wh: 
  description: |
    Set of beliefs or values
  extract: |
    An ideology is a set of beliefs or values attributed to a person or group of persons, especially those held for reasons that are not purely about belief in certain knowledge, in which "practical elements are as prominent as theoretical ones".
- url: https://en.wikipedia.org/wiki/The_Darjeeling_Limited
  created: '2025-08-20T19:23:12Z'
  title: |
    The Darjeeling Limited
  image_url: https://upload.wikimedia.org/wikipedia/en/1/1e/Darjeeling_Limited_Poster.jpg
  image_wh: 259x383
  description: |
    2007 film by Wes Anderson
  extract: |
    The Darjeeling Limited is a 2007 American comedy-drama film directed by Wes Anderson, which he co-produced with Scott Rudin, Roman Coppola, and Lydia Dean Pilcher, and co-wrote with Coppola and Jason Schwartzman. The film stars Owen Wilson, Adrien Brody, and Schwartzman. The cast also includes Waris Ahluwalia, Amara Karan, Wallace Wolodarsky, Barbet Schroeder, and Anjelica Huston, with Natalie Portman, Camilla Rutherford, Irrfan Khan, and Bill Murray in cameo roles.
