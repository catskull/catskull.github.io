    Feda: The Emblem of Justice is a tactical role playing game developed by Max Entertainment and published by Yanoman Games that was originally released for the Super Famicom in 1994. The game centers on two soldiers forced to fight against the now-corrupted empire they used to serve. A version for the Sega Saturn, titled Feda Remake!, was released in 1996. Both versions were released exclusively in Japan.
