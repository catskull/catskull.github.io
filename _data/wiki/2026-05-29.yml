    Dextromethorphan, or DXM, a common active ingredient found in many over-the-counter cough suppressant cold medicines, is used as a recreational drug and entheogen for its dissociative effects. Street names include Brownies, Dextro, Drix, Gel, Del, Groove, Mega-perls, Poor man's Lean, Poor man's ecstasy, Poor man's PCP, Red devils, Robo, Rojo, Rome, Skittles, Super Skittles, Triple Cs, reds, Sky and Velvet.
