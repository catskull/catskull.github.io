    Rice paddy art
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/b/ba/Sengoku_busho_of_rice_field_art.JPG/330px-Sengoku_busho_of_rice_field_art.JPG
  image_wh: 330x440
  description: |
    Japanese art form
  extract: |
    Rice paddy art or tambo art  is an art form originating in Japan where people plant rice of various types and colors to create images in a paddy field.
