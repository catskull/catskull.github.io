    "On the Internet, nobody knows you're a dog" is an adage and Internet meme about Internet anonymity which began as a caption to a cartoon drawn by Peter Steiner, published in the July 5, 1993, issue of the American magazine The New Yorker. The words are those of a large dog sitting on a chair at a desk, with a paw on the keyboard of the computer, speaking to a smaller dog sitting on the floor nearby. Steiner had earned between US$200,000 and US$250,000 by 2013 from its reprinting, by which time it had become the cartoon most reproduced from The New Yorker. In 2023, the original was sold at auction for US$175,000, setting a record for the highest price ever paid for a comic.
