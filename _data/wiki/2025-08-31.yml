  title: |
    Great chain of being
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/b/b5/Great_Chain_of_Being_2.png/330px-Great_Chain_of_Being_2.png
  image_wh: 330x476
  description: |
    Medieval Christian hierarchy of living beings
  extract: |
    The great chain of being is a hierarchical structure of all matter and life, thought by the medieval Islamic world and medieval Christianity to have been decreed by God. The chain begins with God and descends through angels, humans, animals and plants to minerals.
