  title: |
    Of Mice and Men
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Of_Mice_and_Men_%281937_1st_ed_dust_jacket%29.jpg/330px-Of_Mice_and_Men_%281937_1st_ed_dust_jacket%29.jpg
  image_wh: 330x516
  description: |
    1937 novella by John Steinbeck
  extract: |
    Of Mice and Men is a 1937 novella written by American author John Steinbeck. It describes the experiences of George Milton and Lennie Small, two displaced migrant ranch workers, as they move from place to place in California, searching for jobs during the Great Depression.
- url: https://en.wikipedia.org/wiki/John_Steinbeck?wprov=sfti1#
  created: '2025-08-31T03:10:10Z'
  title: |
    John Steinbeck
  image_url: https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/John_Steinbeck_1939_%28cropped%29.jpg/330px-John_Steinbeck_1939_%28cropped%29.jpg
  image_wh: 330x396
  description: |
    American writer and novelist (1902–1968)
  extract: |
    John Ernst Steinbeck was an American writer and novelist. He won the 1962 Nobel Prize in Literature "for his realistic and imaginative writings, combining as they do sympathetic humor and keen social perception". He has been called "a giant of American letters". One of the most widely read authors of the 20th century. He was also an independent journalist and war correspondent during World War II and the Vietnam War.
