    The Gleiwitz incident, or Gliwice incident, was a false flag attack on the radio station Sender Gleiwitz in Gleiwitz staged by Nazi Germany on the night of 31 August 1939. Along with some two dozen similar incidents, the attack was manufactured by Germany as a casus belli to justify the invasion of Poland. Despite the German government using the attack as a justification to go to war with Poland, the Gleiwitz assailants were not Polish but were German SS officers wearing Polish uniforms.
