  extract: |
    Plate armour is a historical type of personal body armour made from bronze, iron, or steel plates, culminating in the iconic suit of armour entirely encasing the wearer. Full plate steel armour developed in Europe during the Late Middle Ages, especially in the context of the Hundred Years' War, from the coat of plates worn over mail suits during the 14th century, a century famous for the Transitional armour, in that plate gradually replaced mail.
