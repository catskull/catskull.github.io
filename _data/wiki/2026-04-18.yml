    The Vision of Escaflowne  is a Japanese anime television series produced by Sunrise. It premiered from April to September 1996, on TV Tokyo. Sony's anime satellite channel, Animax also aired the series, both in Japan and on its various worldwide networks, including Hong Kong, Taiwan, and Southeast Asia. It was licensed for Region 1 release by Bandai Entertainment.
