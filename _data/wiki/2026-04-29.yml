    A superalloy, sometimes called a heat-resistant superalloy (HRSA) or a high-performance alloy, is an alloy with the ability to operate at a high fraction of its melting point. Key characteristics of a superalloy include mechanical strength, thermal creep deformation resistance, surface stability, and corrosion and oxidation resistance.
