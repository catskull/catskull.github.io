    Brandolini's law is an Internet adage coined in 2013 by Italian programmer Alberto Brandolini. It contrasts the considerable effort of debunking misinformation with the relative ease of creating it in the first place. The adage states:The amount of energy needed to refute bullshit is an order of magnitude bigger than that needed to produce it.
